                    example: 463
                  error_key:
                    type: string
                    example: WHATSAPP_REACHOUT_TIMELOCK
                  message:
                    type: string
                    example: The WhatsApp server rejected this message. This was not an internal API error.
                  message_ptbr:
                    type: string
                    example: O servidor do WhatsApp recusou esta mensagem. Isso nao foi um erro interno da API.
                  provider_message:
                    type: string
                    example: >-
                      WhatsApp reported that the currently connected account is under a temporary restriction for
