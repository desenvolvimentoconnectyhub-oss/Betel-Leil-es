                  diagnostics_endpoint:
                    type: string
                    example: /instance/wa_messages_limits
                  details:
                    type: object
                    properties:
                      new_chat_message_capping:
                        type: object
                        additionalProperties: true
                      reachout_timelock:
                        type: object
                        additionalProperties: true
              examples:
                generic:
                  summary: Erro interno generico
                  value:
                    error: Failed to send message
                whatsapp_463:
                  summary: Erro do WhatsApp ao iniciar novas conversas
                  value:
                    error: >-
                      WhatsApp server error 463: WhatsApp reported that the currently connected account is under a
                      temporary restriction for starting new conversations, usually related to sending volume or
                      quality.
                    error_source: whatsapp_server
                    provider: whatsapp
                    provider_code: 463
                    error_key: WHATSAPP_REACHOUT_TIMELOCK
                    message: The WhatsApp server rejected this message. This was not an internal API error.
                    message_ptbr: O servidor do WhatsApp recusou esta mensagem. Isso nao foi um erro interno da API.
                    provider_message: >-
                      WhatsApp reported that the currently connected account is under a temporary restriction for
