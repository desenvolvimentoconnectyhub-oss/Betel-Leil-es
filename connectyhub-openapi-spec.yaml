  /provider/message/find:
    post:
      tags:
        - Acoes na mensagem e Buscar
      summary: Buscar mensagens em um chat
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Busca mensagens com multiplos filtros disponiveis. Este endpoint permite:


        1. **Busca por ID especifico**: Use `id` para encontrar uma mensagem exata

        2. **Filtrar por chat**: Use `chatid` para mensagens de uma conversa especifica

        3. **Filtrar por rastreamento**: Use `track_source` e `track_id` para mensagens com dados de tracking

        4. **Limitar resultados**: Use `limit` para controlar quantas mensagens retornar

        5. **Ordenacao**: Resultados ordenados por data (mais recentes primeiro)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    id:
                      type: string
                      description: ID especifico da mensagem para busca exata
                      example: user123:r3EB0538
                    chatid:
                      type: string
                      description: ID do chat no formato internacional
                      example: 5511999999999@s.whatsapp.net
                    track_source:
                      type: string
                      description: Origem do rastreamento para filtrar mensagens
                      example: chatwoot
                    track_id:
                      type: string
                      description: ID de rastreamento para filtrar mensagens
                      example: msg_123456789
                    limit:
                      type: integer
                      description: Numero maximo de mensagens a retornar (padrao 100)
                      minimum: 1
                      default: 100
                      example: 20
                    offset:
                      type: integer
                      description: Deslocamento para paginacao (0 retorna as mensagens mais recentes)
                      default: 0
      responses:
        '200':
          description: Lista de mensagens encontradas com metadados de paginacao
          content:
            application/json:
              schema:
                type: object
                properties:
                  returnedMessages:
                    type: integer
                    description: Quantidade de mensagens retornadas nesta pagina
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                  limit:
                    type: integer
                    description: Limite aplicado na busca
                  offset:
                    type: integer
                    description: Offset usado para recuperar os resultados
                  nextOffset:
                    type: integer
                    description: Offset sugerido para a proxima pagina
                  hasMore:
                    type: boolean
                    description: Indica se existem mais mensagens apos esta pagina
        '400':
          description: Parametros invalidos
        '401':
          description: Chave invalida ou expirada
        '404':
          description: Chat nao encontrado
        '500':
          description: Erro interno do servidor
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostMessageFind
  /provider/message/history-sync:
    post:
      tags:
        - Acoes na mensagem e Buscar
      summary: Solicitar historico sob demanda de um chat
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Solicita ao WhatsApp um sync sob demanda de mensagens antigas de um chat

        ou tenta recuperar uma mensagem exata ja conhecida localmente.


        Modos suportados:

        - `history` (padrao): busca historico para tras a partir de uma mensagem ancora

        - `exact`: tenta recarregar a mensagem exata informada em `messageid`


        Regras:

        - envie `number`

        - `mode` e opcional; quando omitido, assume `history`

        - em `mode=history`, `count` e opcional e limitado a 100

        - em `mode=history`, `messageid` e opcional; quando informado, a API usa essa mensagem como referencia para
        buscar mensagens mais antigas do chat

        - em `mode=exact`, `messageid` e obrigatorio e `count` nao e necessario


        Observacao:

        - **Importante:** a recuperacao pode so acontecer depois de abrir o WhatsApp no celular ou deixa-lo ativo em
        segundo plano

        - em `mode=history`, `messageid` define a mensagem de referencia para carregar historico anterior

        - em `mode=history`, esse campo nao serve para buscar essa mensagem especifica

        - em `mode=history`, o historico e buscado para tras a partir da mensagem de referencia informada

        - se voce quiser recuperar apenas uma mensagem especifica `X` via historico, informe como `messageid` a mensagem
        logo depois de `X` e use `count=1`

        - se `messageid` nao for informado em `mode=history`, a API usa a mensagem mais antiga conhecida localmente
        desse chat como referencia para buscar historico anterior

        - em `mode=exact`, a API tenta um rerequest da mensagem exata informada em `messageid`

        - **`mode=exact` esta em teste** e funciona melhor quando a mensagem ja existe no historico local da instancia

        - as mensagens retornam depois via webhook/SSE em eventos do tipo `history` e tambem ficam disponiveis em
        `/message/find`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  required:
                    - number
                  properties:
                    mode:
                      type: string
                      enum:
                        - history
                        - exact
                      default: history
                      description: |
                        Define o comportamento da operacao.
                        - `history`: busca mensagens mais antigas a partir de uma ancora
                        - `exact`: tenta recuperar a mensagem exata informada em `messageid`
                      example: history
                    messageid:
                      type: string
                      description: >
                        Em `mode=history`, ID da mensagem de referencia usada para buscar mensagens mais antigas do
                        chat.

                        Em `mode=exact`, ID exato da mensagem que deve ser recarregada.
                      example: 3EB01234567890ABCDEF
                    number:
                      type: string
                      description: >-
                        JID completo do chat. Mantido obrigatorio em todos os modos para simplificar o contrato publico
                        e restringir a busca ao chat esperado.
                      example: 5511999999999@s.whatsapp.net
                    count:
                      type: integer
                      minimum: 1
                      maximum: 100
                      description: >-
                        Quantidade desejada de mensagens no sync em `mode=history`. Em `mode=exact`, este campo e
                        ignorado.
                      example: 20
      responses:
        '200':
          description: Solicitacao enviada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  mode:
                    type: string
                    example: history
                  message:
                    type: string
                    example: History sync request sent. Messages will be received as history sync events.
                  details:
                    type: object
                    additionalProperties: true
                    description: Metadados adicionais da operacao
              examples:
                async_padrão:
                  summary: Solicitacao de historico enviada
                  value:
                    success: true
                    mode: history
                    message: History sync request sent. Messages will be received as history sync events.
                exact_padrão:
                  summary: Solicitacao de mensagem exata enviada
                  value:
                    success: true
                    mode: exact
                    message: Exact message reload request sent. The message will be received if available.
        '400':
          description: Payload invalido, modo invalido ou ancora insuficiente
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: number is required
        '404':
          description: Mensagem exata nao encontrada no historico local
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: messageid not found in local history for chat; use mode=history to fetch older messages first
        '500':
          description: Erro interno ao solicitar o history sync ou o rerequest exato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to request history: connection closed'
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostMessageHistorySync
  /provider/message/markread:
    post:
      tags:
        - Acoes na mensagem e Buscar
      summary: Marcar mensagens como lidas
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Marca uma ou mais mensagens como lidas. Este endpoint permite:

        1. Marcar multiplas mensagens como lidas de uma vez

        2. Atualizar o status de leitura no WhatsApp

        3. Sincronizar o status de leitura entre dispositivos


        Exemplo de requisicao basica:

        ```json

        {
          "id": [
            "62AD1AD844E518180227BF68DA7ED710",
            "ECB9DE48EB41F77BFA8491BFA8D6EF9B"
          ]
        }

        ```


        Exemplo de resposta:

        ```json

        {
          "success": true,
          "message": "Messages marked as read",
          "markedMessages": [
            {
              "id": "62AD1AD844E518180227BF68DA7ED710",
              "timestamp": 1672531200000
            },
            {
              "id": "ECB9DE48EB41F77BFA8491BFA8D6EF9B",
              "timestamp": 1672531300000
            }
          ]
        }

        ```


        Parametros disponiveis:

        - id: Lista de IDs das mensagens a serem marcadas como lidas


        Erros comuns:

        - 401: Chave invalida ou expirada

        - 400: Lista de IDs vazia ou invalida

        - 404: Uma ou mais mensagens nao encontradas

        - 500: Erro ao marcar mensagens como lidas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    id:
                      type: array
                      description: Lista de IDs das mensagens a serem marcadas como lidas
                      items:
                        type: string
                      example:
                        - 62AD1AD844E518180227BF68DA7ED710
                        - ECB9DE48EB41F77BFA8491BFA8D6EF9B
                  required:
                    - id
      responses:
        '200':
          description: Messages successfully marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        message_id:
                          type: string
                          description: ID of the message that was processed
                        status:
                          type: string
                          enum:
                            - success
                            - error
                          description: Status of the mark as read operation
                        error:
                          type: string
                          description: Error message if status is error
                    example:
                      - message_id: 62AD1AD844E518180227BF68DA7ED710
                        status: success
                      - message_id: ECB9DE48EB41F77BFA8491BFA8D6EF9B
                        status: error
                        error: Message not found
        '400':
          description: Invalid request payload or missing required fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing Id in Payload
        '401':
          description: Unauthorized - invalid or missing token
        '500':
          description: Server error while processing the request
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostMessageMarkread
  /provider/message/react:
    post:
      tags:
        - Acoes na mensagem e Buscar
      summary: Enviar reacao a uma mensagem
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Envia uma reacao (emoji) a uma mensagem especifica. Este endpoint permite:


        1. Adicionar ou remover reacoes em mensagens


        2. Usar qualquer emoji Unicode valido


        3. Reagir a mensagens em chats individuais ou grupos


        4. Remover reacoes existentes


        5. Verificar o status da reacao enviada



        Tipos de reacoes suportados:


        - Qualquer emoji Unicode valido (, , , etc)


        - String vazia para remover reacao



        Exemplo de requisicao basica:


        ```json


        {
          "number": "5511999999999@s.whatsapp.net",
          "text": "",
          "id": "3EB0538DA65A59F6D8A251"
        }


        ```



        Exemplo de requisicao para remover reacao:


        ```json


        {
          "number": "5511999999999@s.whatsapp.net",
          "text": "",
          "id": "3EB0538DA65A59F6D8A251"
        }


        ```



        Exemplo de resposta:


        ```json


        {
          "success": true,
          "message": "Reaction sent",
          "reaction": {
            "id": "3EB0538DA65A59F6D8A251",
            "emoji": "",
            "timestamp": 1672531200000,
            "status": "sent"
          }
        }


        ```



        Exemplo de resposta ao remover reacao:


        ```json


        {
          "success": true,
          "message": "Reaction removed",
          "reaction": {
            "id": "3EB0538DA65A59F6D8A251",
            "emoji": null,
            "timestamp": 1672531200000,
            "status": "removed"
          }
        }


        ```



        Parametros disponiveis:


        - number: Numero do chat no formato internacional (ex:

        5511999999999@s.whatsapp.net)


        - text: Emoji Unicode da reacao (ou string vazia para remover reacao)


        - id: ID da mensagem que recebera a reacao



        Erros comuns:


        - 401: Chave invalida ou expirada


        - 400: Numero invalido ou emoji nao suportado


        - 404: Mensagem nao encontrada


        - 500: Erro ao enviar reacao



        Limitacoes:


        - So e possivel reagir a mensagens enviadas por outros usuarios


        - Nao e possivel reagir a mensagens antigas (mais de 7 dias)


        - O mesmo usuario so pode ter uma reacao ativa por mensagem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: Numero do chat no formato internacional
                      example: 5511999999999@s.whatsapp.net
                    text:
                      type: string
                      description: Emoji Unicode da reacao (ou string vazia para remover reacao)
                      example: ''
                    id:
                      type: string
                      description: ID da mensagem que recebera a reacao
                      example: 3EB0538DA65A59F6D8A251
                  required:
                    - number
                    - text
                    - id
      responses:
        '200':
          description: Reacao enviada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID unico da mensagem de reacao
                    example: owner:generated_message_id
                  messageid:
                    type: string
                    description: ID gerado para a mensagem de reacao
                    example: generated_message_id
                  content:
                    type: object
                    description: Detalhes da reacao
                  messageTimestamp:
                    type: number
                    description: Timestamp da mensagem em milissegundos
                    example: 1672531200000
                  messageType:
                    type: string
                    description: Tipo da mensagem
                    example: reaction
                  status:
                    type: string
                    description: Status atual da mensagem
                    example: Pending
                  owner:
                    type: string
                    description: Proprietario da instancia
                    example: instance_owner
        '400':
          description: Erro nos dados da requisicao
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing Id in Payload
        '401':
          description: Nao autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '404':
          description: Mensagem nao encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Message not found
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error sending message
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostMessageReact
