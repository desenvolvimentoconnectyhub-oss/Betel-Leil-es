  /provider/labels/refresh:
    post:
      tags:
        - Etiquetas
      summary: Iniciar recarga de etiquetas do WhatsApp
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Inicia uma nova leitura das etiquetas no WhatsApp em background.

        A resposta confirma apenas que a recarga foi iniciada ou que ja existe uma recarga em andamento.

        Para obter a lista atualizada, consulte `GET /labels` depois.


        Efeitos no backend:

        - a recarga tambem processa associacoes de etiquetas sincronizadas do WhatsApp

        - chats existentes podem ter o campo `wa_label` atualizado com as etiquetas corretas

        - quando uma associacao de etiqueta muda apos a sincronizacao do historico, o webhook `chat_labels` pode ser
        enviado com os dados completos do chat


        Uso recomendado:

        - tente primeiro com `force=false`

        - se isso nao trouxer as etiquetas corretamente, tente `force=true`

        - use `force=true` apenas como tentativa de correcao, porque ele faz uma recarga mais pesada
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    force:
                      type: boolean
                      default: false
                      description: |
                        Tente primeiro com `false`.
                        Use `true` apenas quando a recarga padrao nao funcionar bem,
                        pois esse modo faz uma nova leitura mais completa das etiquetas.
                      example: false
      responses:
        '202':
          description: Recarga de etiquetas aceita para processamento em background
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - status
                  - message
                  - force
                  - fullSync
                properties:
                  success:
                    type: boolean
                    example: true
                  status:
                    type: string
                    enum:
                      - started
                      - in_progress
                    example: started
                  message:
                    type: string
                    example: Label refresh started. Use GET /labels to fetch the refreshed list.
                  force:
                    type: boolean
                    example: false
                  fullSync:
                    type: boolean
                    example: false
        '409':
          description: A recarga nao pode ser executada porque a sincronizacao do historico ainda esta em andamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: history sync still in progress, try again in a moment
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: failed to reload labels from WhatsApp
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostLabelsRefresh
  /provider/quickreply/edit:
    post:
      tags:
        - Respostas Rapidas
      summary: Criar, atualizar ou excluir resposta rapida
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Gerencia templates de respostas rapidas para agilizar o atendimento. Por padrao, cria respostas rapidas locais.

        Para criar/sincronizar uma resposta rapida no WhatsApp Business, envie `onWhatsApp: true`.


        - Para criar: nao inclua o campo `id`

        - Para atualizar: inclua o `id` existente

        - Para excluir: defina `delete: true` e inclua o `id`


        Observacao: respostas rapidas sincronizadas com o WhatsApp suportam apenas `type: text`.

        Nao e possivel converter uma resposta rapida local existente em resposta do WhatsApp; para criar no WhatsApp,
        envie `onWhatsApp: true` sem `id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  required:
                    - shortCut
                    - type
                  properties:
                    id:
                      type: string
                      description: Necessario para atualizacoes/exclusoes, omitir para criacao
                      example: rb9da9c03637452
                    delete:
                      type: boolean
                      description: Definir como true para excluir o template
                      default: false
                    onWhatsApp:
                      type: boolean
                      description: >-
                        Quando true, cria/sincroniza a resposta rapida no WhatsApp Business via app state. Disponivel
                        apenas para type=text.
                      default: false
                    shortCut:
                      type: string
                      description: Atalho para acesso rapido ao template
                      example: saudacao1
                    type:
                      type: string
                      enum:
                        - text
                        - audio
                        - myaudio
                        - ptt
                        - document
                        - video
                        - image
                      description: Tipo da mensagem
                    text:
                      type: string
                      description: Obrigatorio para mensagens do tipo texto
                      example: Ola! Como posso ajudar hoje?
                    file:
                      type: string
                      description: URL ou Base64 para tipos de midia
                      example: https://exemplo.com/arquivo.pdf
                    docName:
                      type: string
                      description: Nome do arquivo opcional para tipo documento
                      example: apresentacao.pdf
      responses:
        '200':
          description: Operacao concluida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Operacao concluida com sucesso
                  quickReplies:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuickReply'
        '400':
          description: Requisicao invalida (erro de validacao)
        '404':
          description: Template nao encontrado
        '500':
          description: Erro no servidor ou falha ao sincronizar com WhatsApp
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostQuickreplyEdit
