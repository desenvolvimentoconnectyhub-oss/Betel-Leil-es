  /provider/community/editgroups:
    post:
      tags:
        - Grupos e Comunidades
      summary: Gerenciar grupos em uma comunidade
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Adiciona ou remove grupos de uma comunidade do WhatsApp. Apenas administradores da comunidade podem executar
        estas operacoes.


        ## Funcionalidades

        - Adicionar multiplos grupos simultaneamente a uma comunidade

        - Remover grupos de uma comunidade existente

        - Suporta operacoes em lote


        ## Limitacoes

        - Os grupos devem existir previamente

        - A comunidade deve existir e o usuario deve ser administrador

        - Grupos ja vinculados nao podem ser adicionados novamente

        - Grupos nao vinculados nao podem ser removidos


        ## Acoes Disponiveis

        - `add`: Adiciona os grupos especificados a comunidade

        - `remove`: Remove os grupos especificados da comunidade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  required:
                    - community
                    - action
                    - groupjids
                  properties:
                    community:
                      type: string
                      description: JID (identificador unico) da comunidade
                      example: 120363153742561022@g.us
                    action:
                      type: string
                      enum:
                        - add
                        - remove
                      description: |
                        Tipo de operacao a ser realizada:
                        * add - Adiciona grupos a comunidade
                        * remove - Remove grupos da comunidade
                    groupjids:
                      type: array
                      items:
                        type: string
                        pattern: ^[0-9]+@g.us$
                      minItems: 1
                      description: Lista de JIDs dos grupos para adicionar ou remover
                      example:
                        - 120363324255083289@g.us
                        - 120363308883996631@g.us
      responses:
        '200':
          description: Operacao realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: community updated
                  success:
                    type: array
                    items:
                      type: string
                    description: Lista de JIDs dos grupos processados com sucesso
                  failed:
                    type: array
                    items:
                      type: string
                    description: Lista de JIDs dos grupos que falharam no processamento
        '400':
          description: Requisicao invalida
        '401':
          description: Nao autorizado
        '403':
          description: Usuario nao e administrador da comunidade
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostCommunityEditgroups
