  /provider/business/catalog/list:
    post:
      tags:
        - Business
      summary: Listar os produtos do catalogo
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Lista uma pagina de produtos do catalogo de um perfil comercial no WhatsApp.


        Observacoes:

        - envie apenas `jid` para buscar a primeira pagina

        - a paginacao publica usa o campo `after`

        - copie exatamente o valor retornado em `response.Paging.After` e envie na proxima chamada

        - o valor de `after` e um token opaco: nao tente decodificar ou modificar

        - a integracao atual retorna ate 10 produtos por chamada

        - o retorno espelha as structs atuais da camada `whatsmeow`, entao os campos de `response` usam nomes em
        maiusculas (`Products`, `Paging`, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    jid:
                      type: string
                      description: JID do catalogo a consultar
                      example: 5511999999999@s.whatsapp.net
                    after:
                      type: string
                      description: Token da proxima pagina. Use exatamente o valor retornado em `response.Paging.After`.
                      example: Q1VSU09SX1BST1hJTUFfUEFHSU5B
                  required:
                    - jid
      responses:
        '200':
          description: Produtos do catalogo recuperados com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    description: Pagina atual do catalogo retornada pelo WhatsApp.
                    properties:
                      JID:
                        type: object
                        description: JID do catalogo consultado, serializado pela struct atual do backend.
                        properties:
                          User:
                            type: string
                            example: '5511999999999'
                          RawAgent:
                            type: integer
                            example: 0
                          Device:
                            type: integer
                            example: 0
                          Integrator:
                            type: integer
                            example: 0
                          Server:
                            type: string
                            example: s.whatsapp.net
                      CartEnabled:
                        type: boolean
                        description: Indica se o carrinho do catalogo esta habilitado.
                        example: false
                      Source:
                        type: string
                        description: Origem do catalogo retornada pelo WhatsApp.
                        example: ''
                      Products:
                        type: array
                        description: Lista de produtos da pagina atual.
                        items:
                          type: object
                          properties:
                            ID:
                              type: string
                              example: '1234567890'
                            Name:
                              type: string
                              example: Produto Exemplo
                            Description:
                              type: string
                              example: Descricao do produto
                            Price:
                              type: object
                              nullable: true
                              properties:
                                Amount:
                                  type: string
                                  example: '1990'
                                Currency:
                                  type: string
                                  example: BRL
                            SalePrice:
                              type: string
                              example: ''
                            RetailerID:
                              type: string
                              example: sku-123
                            Url:
                              type: string
                              example: https://exemplo.com/produto
                            Availability:
                              type: string
                              example: in stock
                            IsHidden:
                              type: boolean
                              example: false
                            StatusInfo:
                              type: object
                              properties:
                                Status:
                                  type: string
                                  example: active
                                CanAppeal:
                                  type: boolean
                                  example: false
                            MaxAvailable:
                              type: integer
                              example: 10
                            ImageFetchStatus:
                              type: string
                              example: success
                            Images:
                              type: array
                              items:
                                type: object
                                properties:
                                  ID:
                                    type: string
                                    example: img-1
                                  OriginalDimensions:
