  /provider/newsletter/updates:
    post:
      tags:
        - Newsletters e Canais
      summary: Buscar updates de mensagens de um canal
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Consulta diretamente no WhatsApp os updates de posts ja existentes de um canal.


        Esta rota e diferente de `/newsletter/messages`:

        - `/newsletter/messages` retorna o conteudo dos posts

        - `/newsletter/updates` retorna mudancas posteriores nos posts, especialmente metricas


        Esta rota tambem nao e um evento de webhook:

        - nao existe webhook `newsletter_messages_update`

        - para views e reactions de canais, consulte `/newsletter/updates` sob demanda


        Casos de uso:

        - atualizar contadores de `views` de posts ja carregados

        - atualizar `reactionCounts` de posts do canal

        - consultar sob demanda os mesmos tipos de metricas que chegam nos live updates internos do WhatsApp


        Observacoes:

        - use preferencialmente `afterid`

        - `afterid` filtra updates depois de um `serverid`

        - `since` filtra pelo momento do update

        - `since` aceita timestamp em segundos ou milissegundos

        - o retorno vem no campo `response`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    id:
                      type: string
                      description: ID numerico do canal. Se informado sem dominio, sera convertido para `@newsletter`.
                      example: '120363123456789012'
                    jid:
                      type: string
                      description: JID completo do canal.
                      example: 120363123456789012@newsletter
                    count:
                      type: integer
                      minimum: 1
                      description: Quantidade maxima de updates retornados.
                      example: 50
                    afterid:
                      type: integer
                      minimum: 1
                      description: Retorna apenas updates posteriores ao `serverid` informado.
                      example: 12345
                    since:
                      type: integer
                      description: |
                        Timestamp de corte.
                        - Se maior que `1000000000000`, e interpretado como milissegundos.
                        - Caso contrario, e interpretado como segundos.
                      example: 1710000000
      responses:
        '200':
          description: Updates de mensagens do canal recuperados com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: array
                    description: Lista de updates de mensagens do canal.
                    items:
                      type: object
                      properties:
                        serverid:
                          type: integer
                          description: Identificador do post no canal.
                          example: 12345
                        messageid:
                          type: string
                          description: ID logico da mensagem.
                          example: 3EB0B4302B3A8A52F7A1
                        type:
                          type: string
                          description: Tipo da mensagem do canal.
                          example: text
                        timestamp:
                          type: string
                          format: date-time
                          description: Momento associado ao update retornado.
                        viewsCount:
                          type: integer
                          description: Quantidade atualizada de visualizacoes.
                          example: 1540
                        reactionCounts:
                          type: object
                          additionalProperties:
                            type: integer
                          description: Mapa atualizado de emoji para quantidade de reacoes.
                          example:
                            👍: 35
                            🔥: 11
                        message:
                          type: object
                          description: |
                            Conteudo bruto da mensagem, quando presente.
                            Em muitos live updates esse campo pode vir ausente.
                          additionalProperties: true
              examples:
                sucesso:
                  value:
                    response:
                      - messageid: 3EB0B4302B3A8A52F7A1
                        serverid: 12345
                        type: text
                        timestamp: '2026-03-24T19:00:00Z'
                        viewsCount: 1540
                        reactionCounts:
                          👍: 35
                          🔥: 11
        '400':
          description: Payload invalido ou ID/JID do canal invalido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid newsletter id
        '401':
          description: Instancia nao autenticada ou cliente nao encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: client not found
        '500':
          description: Erro interno ao consultar updates do canal no WhatsApp
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: connection closed
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostNewsletterUpdates
