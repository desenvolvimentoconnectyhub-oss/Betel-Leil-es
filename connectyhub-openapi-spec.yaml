        ## Como funciona

        - Define o valor em `amount` (BRL por padrao) e opcionalmente personaliza titulo, texto e nota adicional.

        - Por padrao exige `pixKey`.

        - O arquivo apontado por `fileUrl` e anexado como documento (boleto ou fatura em PDF, por exemplo).

        - `paymentLink` habilita o botao externo.




        ## Campos comuns

        Este endpoint tambem suporta os campos padrao: `delay`, `readchat`, `readmessages`, `replyid`,

        `mentions`, `track_source`, `track_id` e `async`.
