                            type: string
                            example: Media sent successfully
                          fileUrl:
                            type: string
                            example: https://mmg.whatsapp.net/...
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid media type or file format
        '401':
          description: Nao autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
