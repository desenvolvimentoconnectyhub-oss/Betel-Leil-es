  /provider/message/pin:
    post:
      tags:
        - Acoes na mensagem e Buscar
      summary: Fixa ou desafixa uma mensagem
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Fixa ou desafixa uma mensagem especifica usando a funcionalidade nativa do WhatsApp.


        O endpoint realiza:

        - Busca a mensagem original no banco de dados usando o ID fornecido

        - Envia a acao de fixar ou desafixar a mensagem no WhatsApp

        - Funciona em conversas individuais e grupos

        - Gera um novo ID para o evento de pin/unpin

        - Retorna objeto de mensagem completo seguindo o padrao da API

        - Dispara eventos SSE/Webhook automaticamente


        **Importante**:

        - O ID pode ser fornecido no formato completo (`owner:messageid`) ou apenas `messageid`

        - Em conversas `1:1`, a acao e suportada normalmente

        - Em grupos, a permissao depende da configuracao do WhatsApp do grupo (`apenas admins` ou `qualquer membro`)

        - O backend nao valida localmente se a instancia e admin do grupo; a decisao final e do WhatsApp

        - Newsletters/canais nao sao suportados neste endpoint

        - Se `pin` nao for enviado, o valor padrao e `true`

        - Ao fixar mensagem, `duration` aceita dias (`1`, `7` ou `30`)

        - Se `duration` nao for enviado ou vier com qualquer outro valor, o backend usa `30` dias

        - Ao desafixar (`pin: false`), `duration` e ignorado
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  required:
                    - id
                  properties:
                    id:
                      type: string
                      description: ID unico da mensagem alvo (formato `owner:messageid` ou apenas `messageid`)
                      example: 3A12345678901234567890123456789012
                    pin:
                      type: boolean
                      default: true
                      description: Define se a mensagem deve ser fixada (`true`) ou desafixada (`false`)
                      example: true
                    duration:
                      type: integer
                      default: 30
                      description: 'Duracao do pin em dias. Valores aceitos: `1`, `7` ou `30`. Qualquer outro valor cai para `30`.'
                      example: 7
      responses:
        '200':
          description: Acao de fixar/desafixar mensagem enviada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID unico da mensagem gerada para o evento de pin/unpin
                    example: 5511999999999:3A12345678901234567890123456789012
                  messageid:
                    type: string
                    description: ID da mensagem do evento no WhatsApp
                    example: 3A12345678901234567890123456789012
                  chatid:
                    type: string
                    description: Chat onde a acao ocorreu
                    example: 120363123456789012@g.us
                  sender:
                    type: string
                    description: JID do remetente da acao
                    example: 5511999999999@s.whatsapp.net
                  senderName:
                    type: string
                    description: Nome do perfil da instancia
                    example: Minha Instancia
                  isGroup:
                    type: boolean
                    description: Indica se o chat e um grupo
                    example: true
                  fromMe:
                    type: boolean
                    description: Indica se a acao foi enviada pela propria instancia
                    example: true
                  content:
                    type: object
                    description: Payload interno de `PinInChatMessage`
                  messageType:
                    type: string
                    description: Tipo da mensagem retornada
                    example: PinInChatMessage
                  source:
                    type: string
                    description: Origem estimada da mensagem
                    example: web
                  messageTimestamp:
                    type: integer
                    description: Timestamp da mensagem em milissegundos
                    example: 1704067200000
                  status:
                    type: string
                    description: Status atual da acao
                    example: Pending
                  text:
                    type: string
                    description: Texto amigavel derivado da acao
                    example: Mensagem fixada
                  quoted:
                    type: string
                    description: ID da mensagem citada, quando aplicavel
                    example: ''
                  edited:
                    type: string
                    description: ID da mensagem editada, quando aplicavel
                    example: ''
                  reaction:
                    type: string
                    description: Emoji de reacao, quando aplicavel
                    example: ''
                  convertOptions:
                    type: string
                    description: Opcoes convertidas para mensagens interativas, quando aplicavel
                    example: ''
                  owner:
                    type: string
                    description: Proprietario da instancia
                    example: '5511999999999'
                  targetMessageID:
                    type: string
                    description: ID da mensagem alvo que foi fixada ou desafixada
                    example: 3EB0538DA65A59F6D8A251
                  pinned:
                    type: boolean
                    description: Estado final solicitado para a mensagem alvo
                    example: true
        '400':
          description: Dados invalidos na requisicao ou operacao nao suportada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: message pinning is not supported for newsletters
        '401':
          description: Sem sessao ativa ou token invalido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '404':
          description: Mensagem nao encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Message not found
        '500':
          description: Erro interno do servidor ou erro retornado pelo WhatsApp
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'error pinning message: ...'
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostMessagePin
