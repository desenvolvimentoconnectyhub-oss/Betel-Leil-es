  /provider/sender/edit:
    post:
      tags:
        - Mensagem em massa
      summary: Controlar campanha de envio em massa
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Permite controlar campanhas de envio de mensagens em massa atraves de diferentes acoes:


        ## Acoes Disponiveis:


        ** stop** - Pausar campanha

        - Pausa uma campanha ativa ou agendada

        - Altera o status para "paused"

        - Use quando quiser interromper temporariamente o envio

        - Mensagens ja enviadas nao sao afetadas


        ** continue** - Continuar campanha

        - Retoma uma campanha pausada

        - Altera o status para "scheduled"

        - Use para continuar o envio apos pausar uma campanha

        - Nao funciona em campanhas ja concluidas ("done")


        ** delete** - Deletar campanha

        - Remove completamente a campanha

        - Deleta apenas mensagens NAO ENVIADAS (status "scheduled")

        - Mensagens ja enviadas sao preservadas no historico

        - Operacao e executada de forma assincrona


        ## Status de Campanhas:

        - **scheduled**: Agendada para envio

        - **sending**: Enviando mensagens

        - **paused**: Pausada pelo usuario

        - **done**: Concluida (nao pode ser alterada)

        - **deleting**: Sendo deletada (operacao em andamento)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    folder_id:
                      type: string
                      description: Identificador unico da campanha de envio
                      example: folder_123
                    action:
                      type: string
                      enum:
                        - stop
                        - continue
                        - delete
                      description: |
                        Acao a ser executada na campanha:
                        - **stop**: Pausa a campanha (muda para status "paused")
                        - **continue**: Retoma campanha pausada (muda para status "scheduled")
                        - **delete**: Remove campanha e mensagens nao enviadas (assincrono)
                      example: stop
                  required:
                    - folder_id
                    - action
      responses:
        '200':
          description: Acao realizada com sucesso
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    title: Resposta para acao 'stop'
                    properties:
                      status:
                        type: string
                        enum:
                          - paused
                        description: Status da campanha apos pausar
                        example: paused
                  - type: object
                    title: Resposta para acao 'continue'
                    properties:
                      status:
                        type: string
                        enum:
                          - scheduled
                        description: Status da campanha apos retomar
                        example: scheduled
                      message:
                        type: string
                        description: Mensagem de confirmacao
                        example: Folder resumed successfully
                  - type: object
                    title: Resposta para acao 'delete'
                    properties:
                      status:
                        type: string
                        enum:
                          - deleting
                        description: Status indicando que a delecao foi iniciada
                        example: deleting
                      message:
                        type: string
                        description: Mensagem informando que a delecao e assincrona
                        example: Folder deletion has been initiated
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: folder_id is required
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostSenderEdit
