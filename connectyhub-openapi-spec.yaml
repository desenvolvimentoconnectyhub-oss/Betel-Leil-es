        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Retorna `wa_notes` de um chat usando apenas os dados ja persistidos localmente.


        Casos de uso:

        - ler a anotacao local ja persistida no chat

        - consultar notas mesmo durante reconexao da sessao do WhatsApp


        Regras:

        - envie `number`

        - para recarregar do WhatsApp, use `/chat/notes/refresh`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: JID completo do chat
                      example: 5511999999999@s.whatsapp.net
      responses:
        '200':
          description: Nota do chat retornada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  chat:
                    $ref: '#/components/schemas/Chat'
                  wa_notes:
                    type: string
                    description: Conteudo atual da nota do chat
                    example: Cliente prefere contato no periodo da tarde
                  source:
                    type: string
                    description: Origem usada para compor a resposta
                    enum:
                      - local
                    example: local
              examples:
                sucesso_local:
                  value:
                    chat:
                      wa_fastid: admin:5511999999999
                      wa_chatid: 5511999999999@s.whatsapp.net
                      wa_notes: Cliente prefere contato no periodo da tarde
                    wa_notes: Cliente prefere contato no periodo da tarde
                    source: local
        '400':
          description: Payload invalido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: number is required
        '404':
          description: Chat nao encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: chat not found
        '500':
          description: Erro interno ao consultar a nota local
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: failed to load chat notes from local database
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostChatNotes
  /provider/chat/notes/refresh:
    post:
      tags:
        - Chats
      summary: Recarregar notas internas do chat no WhatsApp
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Faz uma nova leitura das notas internas do chat no WhatsApp antes de retornar o valor atualizado.


        Uso recomendado:

        - tente primeiro com `force=false`

        - se isso nao atualizar a nota corretamente, tente `force=true`

        - use `force=true` apenas como tentativa de correcao, porque ele faz uma recarga mais pesada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: JID completo do chat
                      example: 5511999999999@s.whatsapp.net
                    force:
                      type: boolean
                      description: |
                        Tente primeiro com `false`.
                        Use `true` apenas quando a recarga padrao nao funcionar bem,
                        pois esse modo faz uma nova leitura mais completa das notas.
                      default: false
                      example: false
      responses:
        '200':
          description: Nota do chat recarregada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  chat:
                    $ref: '#/components/schemas/Chat'
                  wa_notes:
                    type: string
                    description: Conteudo atual da nota do chat
                    example: Cliente prefere contato no periodo da tarde
                  source:
                    type: string
                    description: Origem usada para compor a resposta
                    enum:
                      - appstate_reload
                    example: appstate_reload
        '400':
          description: Payload invalido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: number is required
        '404':
          description: Chat nao encontrado apos o reload
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: chat not found
        '409':
          description: O reload nao pode ser executado porque o history sync inicial ainda esta em andamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: history sync still in progress, try again in a moment
        '500':
          description: Erro interno ao recarregar a nota
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'failed to fetch regular_low app state: connection closed'
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostChatNotesRefresh
