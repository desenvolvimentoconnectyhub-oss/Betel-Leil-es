  /provider/contacts:
    get:
      tags:
        - Contatos
      summary: Retorna lista de contatos do WhatsApp
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId como query string.


        Retorna a lista de contatos do WhatsApp conforme o filtro informado em `contactScope`.


        O endpoint realiza:

        - Busca todos os contatos armazenados

        - Filtra para contatos da agenda, fora da agenda ou todos

        - Usa `address_book` como padrao quando `contactScope` nao for informado

        - Retorna dados formatados incluindo JID e informacoes de nome
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Obrigatorio em chamadas GET.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
        - in: query
          name: contactScope
          required: false
          schema:
            type: string
            enum:
              - address_book
              - outside_address_book
              - all
            default: address_book
          description: Define se a busca retorna apenas contatos da agenda, apenas fora da agenda ou todos os contatos conhecidos.
      responses:
        '200':
          description: Lista de contatos retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    jid:
                      type: string
                      description: 'ID unico do contato no WhatsApp (formato: numero@s.whatsapp.net)'
                      example: 5511999999999@s.whatsapp.net
                    contact_name:
                      type: string
                      description: Nome completo do contato
                      example: Contato Exemplo
                    contact_FirstName:
                      type: string
                      description: Primeiro nome do contato
                      example: Contato
                  example:
                    jid: 5511999999999@s.whatsapp.net
                    contact_name: Contato Exemplo
                    contact_FirstName: Contato
        '401':
          description: Sem sessao ativa
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Internal server error
      operationId: providerGetContacts
  /provider/contacts/list:
    post:
      tags:
        - Contatos
      summary: Listar todos os contatos com paginacao
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Retorna uma lista paginada de contatos da conta do WhatsApp atualmente conectada.

        Use este endpoint (POST) para controlar `limit` e `offset` via corpo da requisicao.

        O campo `contactScope` permite escolher entre contatos da agenda, fora da agenda ou todos os contatos
        conhecidos.

        A rota GET `/contacts` continua disponivel para quem prefere a lista completa sem paginacao.
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    limit:
                      type: integer
                      description: Quantidade maxima de resultados por pagina (padrao 100, maximo 1000)
                      default: 100
                    offset:
                      type: integer
                      description: Deslocamento base zero para paginacao
                      default: 0
                    contactScope:
                      type: string
                      description: >-
                        Define se a busca retorna apenas contatos da agenda, apenas fora da agenda ou todos os contatos
                        conhecidos.
                      enum:
                        - address_book
                        - outside_address_book
                        - all
                      default: address_book
      responses:
        '200':
          description: Lista de contatos recuperada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        jid:
                          type: string
                          description: 'ID unico do contato no WhatsApp (formato: numero@s.whatsapp.net)'
                          example: 5511999999999@s.whatsapp.net
                        contact_name:
                          type: string
                          description: Nome completo do contato (quando salvo)
                          example: Joao Silva
                        contact_FirstName:
                          type: string
                          description: Primeiro nome do contato
                          example: Joao
                  totalDeviceContacts:
                    type: integer
                    description: Total bruto de contatos no dispositivo
                  pagination:
                    type: object
                    properties:
                      totalRecords:
                        type: integer
                        description: Total de contatos apos filtragem
                      limit:
                        type: integer
                        description: Limite aplicado na pagina atual
                      offset:
                        type: integer
                        description: Offset efetivamente usado na pagina atual
        '401':
          description: Token nao fornecido ou invalido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '500':
          description: Erro interno do servidor ao recuperar contatos
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem detalhando o erro encontrado
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostContactsList
