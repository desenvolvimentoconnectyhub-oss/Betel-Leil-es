  /provider/group/ephemeral:
    post:
      summary: Configurar mensagens temporarias em grupo
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Define o temporizador de mensagens temporarias (disappearing messages) de um grupo.


        Valores aceitos para a duracao:

        - `0` ou `off` para desativar

        - `1d`

        - `7d`

        - `90d`


        Observacoes:

        - este endpoint e apenas para grupos

        - requer privilegios de administrador do grupo

        - se o identificador informado nao for de grupo, a API retorna erro orientando usar `/chat/ephemeral`

        - apos sucesso, a resposta devolve o chat atualizado e o snapshot mais recente do grupo no cache local
      tags:
        - Grupos e Comunidades
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  required:
                    - groupjid
                    - duration
                  properties:
                    groupjid:
                      type: string
                      description: JID do grupo no formato xxxxx@g.us
                      example: 120363339858396166@g.us
                    duration:
                      oneOf:
                        - type: string
                        - type: integer
                      description: Duracao desejada para mensagens temporarias
                      example: 1d
      responses:
        '200':
          description: Temporizador atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Ephemeral timer updated successfully
                  chat:
                    $ref: '#/components/schemas/Chat'
                  ephemeral:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        example: true
                      seconds:
                        type: integer
                        format: int64
                        example: 86400
                      label:
                        type: string
                        example: 1d
                  group:
                    $ref: '#/components/schemas/Group'
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisou ser recarregado no cache local
                    example: false
              examples:
                sucesso:
                  summary: Timer atualizado
                  value:
                    response: Ephemeral timer updated successfully
                    chat:
                      wa_chatid: 120363339858396166@g.us
                      wa_ephemeralExpiration: 86400
                      wa_isGroup: true
                    ephemeral:
                      enabled: true
                      seconds: 86400
                      label: 1d
                    group:
                      JID: 120363339858396166@g.us
                      IsEphemeral: true
                      DisappearingTimer: 86400
                    needs_refresh: false
        '400':
          description: Payload invalido, grupo invalido ou duracao nao suportada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'invalid duration. Allowed values: 0, off, 1d, 7d, 90d'
        '401':
          description: Token invalido ou ausente
        '403':
          description: Usuario nao e administrador do grupo
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: user is not an admin of this group
        '500':
          description: Erro interno ao atualizar o temporizador
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Error updating chat ephemeral timer: connection closed'
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostGroupEphemeral
  /provider/group/updateImage:
    post:
      tags:
        - Grupos e Comunidades
      summary: Atualizar imagem do grupo
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Altera a imagem do grupo especificado. A imagem pode ser enviada como URL ou como string base64.


        Requisitos da imagem:

        - Formato: JPEG

        - Resolucao maxima: 640x640 pixels

        - Imagens maiores ou diferente de JPEG nao sao aceitas pelo WhatsApp


        Para remover a imagem atual, envie "remove" ou "delete" no campo image.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    groupjid:
                      type: string
                      description: JID do grupo
                      example: 120363308883996631@g.us
                    image:
                      type: string
                      description: |
                        URL da imagem, string base64 ou "remove"/"delete" para remover.
                        A imagem deve estar em formato JPEG e ter resolucao maxima de 640x640.
                      examples:
                        - https://example.com/image.jpg
