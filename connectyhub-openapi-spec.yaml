                                    example: https://mmg.whatsapp.net/v/t62.7118-24/...
                                  OriginalImageUrl:
                                    type: string
                                    example: https://lookaside.whatsapp.net/...
                      Paging:
                        type: object
                        description: Cursores de paginacao retornados pelo WhatsApp.
                        properties:
                          Before:
                            type: string
                            example: ''
                          After:
                            type: string
                            example: Q1VSU09SX1BST1hJTUFfUEFHSU5B
              examples:
                sucesso:
                  value:
                    response:
                      JID:
                        User: '5511999999999'
                        RawAgent: 0
