  /provider/message/presence:
    post:
      tags:
        - Enviar Mensagem
      summary: Enviar atualizacao de presenca
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Envia uma atualizacao de presenca para um contato ou grupo de forma **assincrona**.


        ##  Comportamento Assincrono:

        - **Execucao independente**: A presenca e gerenciada em background, nao bloqueia o retorno da API

        - **Limite maximo**: 5 minutos de duracao (300 segundos)

        - **Tick de atualizacao**: Reenvia a presenca a cada 10 segundos

        - **Cancelamento automatico**: Presenca e cancelada automaticamente ao enviar uma mensagem para o mesmo chat


        ##  Tipos de presenca suportados:

        - **composing**: Indica que voce esta digitando uma mensagem

        - **recording**: Indica que voce esta gravando um audio

        - **paused**: Remove/cancela a indicacao de presenca atual


        ##  Controle de duracao:

        - **Sem delay**: Usa limite padrao de 5 minutos

        - **Com delay**: Usa o valor especificado (maximo 5 minutos)

        - **Cancelamento**: Envio de mensagem cancela presenca automaticamente


        ##  Exemplos de uso:


        ### Digitar por 30 segundos:

        ```json

        {
          "number": "5511999999999",
          "presence": "composing",
          "delay": 30000
        }

        ```


        ### Gravar audio por 1 minuto:

        ```json

        {
          "number": "5511999999999",
          "presence": "recording",
          "delay": 60000
        }

        ```


        ### Cancelar presenca atual:

        ```json

        {
          "number": "5511999999999",
          "presence": "paused"
        }

        ```


        ### Usar limite maximo (5 minutos):

        ```json

        {
          "number": "5511999999999",
          "presence": "composing"
        }

        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: 'Numero do destinatario no formato internacional (ex: 5511999999999)'
                      example: '5511999999999'
                    presence:
                      type: string
                      description: Tipo de presenca a ser enviada
                      enum:
                        - composing
                        - recording
                        - paused
                      example: composing
                    delay:
                      type: integer
                      description: |
                        Duracao em milissegundos que a presenca ficara ativa (maximo 5 minutos = 300000ms).
                        Se nao informado ou valor maior que 5 minutos, usa o limite padrao de 5 minutos.
                        A presenca e reenviada a cada 10 segundos durante este periodo.
                      maximum: 300000
                      example: 30000
                  required:
                    - number
                    - presence
      responses:
        '200':
          description: Presenca atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de confirmacao
                    example: Chat presence sent successfully
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descricao do erro
                    example: Numero invalido ou tipo de presenca invalido
        '401':
          description: Chave invalida ou expirada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descricao do erro de autenticacao
                    example: Chave invalida ou expirada
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descricao do erro interno
                    example: Erro ao enviar presenca
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostMessagePresence
  /provider/send/status:
    post:
      tags:
        - Enviar Mensagem
      summary: Enviar status (stories)
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Envia um status do WhatsApp com suporte para texto, imagem, video e audio.


        Este endpoint possui 3 modos de uso:


        - envio normal: omita `recipients` e `max_recipients`

        - envio explicito: informe `recipients` para enviar apenas para numeros especificos; o backend aproveita os
        validos e descarta os invalidos com motivo no `debug`

        - envio parcial: informe `max_recipients` para limitar a audiencia ou aplicar um cap de seguranca sobre
        `recipients`


        ## Observacao importante sobre `recipients`

        Quando `recipients` e informado, o backend:


        - aceita numeros em formato WhatsApp, JIDs `@s.whatsapp.net` e JIDs `@lid`

        - quando recebe `@lid`, primeiro tenta resolver esse identificador para o PN (`@s.whatsapp.net`) usando o cache
        local de LID do WhatsApp

        - se o `@lid` nao puder ser resolvido para PN, esse item e descartado com motivo `lid_unresolved`

        - valida se o destinatario existe no WhatsApp usando o mesmo fluxo de verificacao do envio normal, com batch
        para evitar uma chamada remota por recipient

        - cruza os destinatarios verificados com a audiencia atual permitida pela privacidade do status, aceitando
        equivalencia PN/LID quando o cache local conhece esse vinculo

        - recipients descartados aparecem em `debug.discarded_recipients`, com motivos como `invalid_format`,
        `lid_unresolved`, `not_on_whatsapp`, `outside_status_audience` e `duplicate`

        - a requisicao so retorna `400` quando nenhum recipient valido sobra para envio


        ## Observacao importante sobre `max_recipients`

        O campo `max_recipients` foi adicionado como mitigacao operacional.

        Ja observamos casos em que o WhatsApp bloqueia imediatamente o envio de status quando a audiencia e muito grande

        (por exemplo, agendas com milhares de contatos, como ~3.000).

        A causa exata ainda nao esta totalmente clara, entao a recomendacao e comecar com limites menores e aumentar
        gradualmente.


        ## Tipos suportados

        - `text`: texto com cor de fundo e fonte

        - `image`: imagem com legenda opcional

        - `video`: video com legenda opcional

        - `audio`: audio normal

        - `myaudio`: audio enviado como voz

        - `ptt`: audio enviado como voz


        ## Cores de fundo

        Informe um valor de `1` a `19`. O backend converte esse indice para a cor ARGB usada pelo WhatsApp.


        - `1`: amarelo esverdeado suave

        - `2`: amarelo palido

        - `3`: amarelo alaranjado vibrante

        - `4`: verde vibrante

        - `5`: verde musgo

        - `6`: verde claro

        - `7`: azul piscina

        - `8`: azul intenso

        - `9`: azul claro acinzentado

        - `10`: lilas claro

        - `11`: lilas quente

        - `12`: roxo azulado

        - `13`: magenta profundo

        - `14`: rosa suave

        - `15`: salmao rosado

        - `16`: marrom claro

        - `17`: cinza claro azulado

        - `18`: cinza medio

        - `19`: cinza profundo padrao


        Exemplo rapido:

        - `7`: azul piscina

        - `13`: magenta profundo

        - `19`: cinza profundo (padrao)


        ## Fontes validas para `type=text`

        Valores aceitos atualmente: `0`, `1`, `2`, `6`, `7`, `8`, `9`, `10`.


        ## Limites

        - `text`: maximo de 656 caracteres

        - `max_recipients`: nao pode ser negativo

        - `recipients`: aceita numeros, JIDs `@s.whatsapp.net` e JIDs `@lid`

        - `@lid` so entra no envio quando puder ser resolvido localmente para um PN valido; caso contrario, e descartado

        - para tipos de midia, `file` e obrigatorio


        Exemplo de envio explicito:

        ```json

        {
          "type": "text",
          "text": "Novidades chegando!",
          "recipients": [
            "5511999999999",
            "5511888888888@s.whatsapp.net"
          ]
        }

        ```


        Exemplo de envio parcial:

        ```json

        {
          "type": "text",
          "text": "Novidades chegando!",
          "background_color": 7,
          "font": 1,
          "max_recipients": 100
        }

        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - text
                        - image
                        - video
                        - audio
                        - myaudio
                        - ptt
                      description: Tipo do status.
                      example: text
                    text:
                      type: string
                      description: Texto principal ou legenda.
                      example: Novidades chegando!
                    background_color:
                      type: integer
                      minimum: 1
                      maximum: 19
                      description: Indice da cor de fundo para status em texto.
                      example: 7
                    font:
                      type: integer
                      enum:
                        - 0
                        - 1
                        - 2
                        - 6
                        - 7
                        - 8
                        - 9
                        - 10
                      description: Fonte aceita para `type=text`.
                      example: 1
                    file:
                      type: string
                      description: URL ou base64 do arquivo de midia.
                      example: https://example.com/video.mp4
                    thumbnail:
                      type: string
                      description: Campo aceito no payload; o backend gera thumbnail automaticamente quando necessario.
                      example: https://example.com/thumb.jpg
                    mimetype:
                      type: string
                      description: MIME type do arquivo, quando necessario.
                      example: video/mp4
                    recipients:
                      type: array
                      description: >-
                        Lista explicita de destinatarios. Aceita numeros em formato WhatsApp, JIDs `@s.whatsapp.net` e
                        JIDs `@lid`. O backend valida item a item, descarta os invalidos com motivo no `debug` e envia
                        para o subconjunto valido restante. Entradas `@lid` dependem de resolucao local para PN.
                      items:
                        type: string
                      example:
                        - '5511999999999'
                        - 5511888888888@s.whatsapp.net
                    max_recipients:
                      type: integer
                      minimum: 0
                      description: >-
                        Limita o envio a um subconjunto deterministico da audiencia. Quando `recipients` for informado,
                        funciona como cap de seguranca sobre a lista explicita ja validada.
                      example: 100
                  required:
                    - type
      responses:
        '200':
          description: Status enviado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  Id:
                    type: string
                    description: ID da mensagem quando ha envio real.
                    example: ABCD1234
                  content:
                    type: object
                    description: Conteudo processado da mensagem quando ha envio real.
                  messageTimestamp:
                    type: integer
                    description: Timestamp em milissegundos quando ha envio real.
                    example: 1672531200000
                  status:
                    type: string
                    description: Status do envio quando ha envio real.
                    example: Pending
                  debug:
                    type: object
                    description: Metricas agregadas da audiencia e da selecao aplicada.
                    properties:
                      status_privacy_type:
                        type: string
                        example: contacts
                      audience_recipient_count:
                        type: integer
                        example: 245
                      total_contacts_in_store:
                        type: integer
                        example: 300
                      contacts_with_full_name:
                        type: integer
                        example: 245
                      contacts_with_push_name_only:
                        type: integer
                        example: 32
                      contacts_with_business_name_only:
                        type: integer
                        example: 23
                      used_default_privacy_fallback:
                        type: boolean
                        example: false
                      privacy_lookup_error:
                        type: string
                        example: privacy unavailable
                      explicit_recipients:
                        type: boolean
                        example: true
                      requested_recipient_count:
                        type: integer
                        example: 25
                      resolved_recipient_count:
                        type: integer
                        example: 20
                      discarded_recipient_count:
                        type: integer
                        example: 5
                      discarded_recipients:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: string
                              example: 144637553594388@lid
                            reason:
                              type: string
                              example: lid_unresolved
                      max_recipients:
                        type: integer
                        example: 100
                      selected_recipient_count:
                        type: integer
                        example: 100
                      partial_send:
                        type: boolean
                        example: true
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid font
                  debug:
                    type: object
                    description: >-
                      Presente especialmente quando `recipients` foi informado, para indicar quais itens foram
                      descartados antes de concluir que nenhum recipient valido sobrou.
        '401':
          description: Nao autorizado
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'failed to determine status audience: privacy unavailable'
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostSendStatus
  /provider/send/menu:
    post:
      tags:
        - Enviar Mensagem
      summary: Enviar menu interativo (botoes, carrosel, lista ou enquete)
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Este endpoint oferece uma interface unificada para envio de quatro tipos principais de mensagens interativas:

        - Botoes: Para acoes rapidas e diretas

        - Carrosel de Botoes: Para uma lista horizontal de botoes com imagens

        - Listas: Para menus organizados em secoes

        - Enquetes: Para coleta de opinioes e votacoes


        **Suporte a campos de rastreamento**: Este endpoint tambem suporta `track_source` e `track_id` documentados na
        tag **"Enviar Mensagem"**.


        ## Estrutura Base do Payload


        Todas as requisicoes seguem esta estrutura base:


        ```json

        {
          "number": "5511999999999",
          "type": "button|list|poll|carousel",
          "text": "Texto principal da mensagem",
          "choices": ["opcoes baseadas no tipo escolhido"],
          "footerText": "Texto do rodape (opcional para botoes e listas)",
          "listButton": "Texto do botao (para listas)",
          "selectableCount": "Numero de opcoes selecionaveis (apenas para enquetes)"
        }

        ```


        ## Tipos de Mensagens Interativas


        ### 1. Botoes (type: "button")


        Cria botoes interativos com diferentes funcionalidades de acao.


        #### Campos Especificos

        - `footerText`: Texto opcional exibido abaixo da mensagem principal

        - `choices`: Array de opcoes que serao convertidas em botoes


        #### Formatos de Botoes

        Cada botao pode ser configurado usando `|` (pipe) ou `\n` (quebra de linha) como separadores:


        - **Botao de Resposta**:
          - `"texto|id"` ou
          - `"texto\nid"` ou
          - `"texto"` (ID sera igual ao texto)

        - **Botao de Copia**:
          - `"texto|copy:codigo"` ou
          - `"texto\ncopy:codigo"`

        - **Botao de Chamada**:
          - `"texto|call:+5511999999999"` ou
          - `"texto\ncall:+5511999999999"`

        - **Botao de URL**:
          - `"texto|https://exemplo.com"` ou
          - `"texto|url:https://exemplo.com"`

        #### Botoes com Imagem

        Para adicionar uma imagem aos botoes, use o campo `imageButton` no payload:


        #### Exemplo com Imagem

        ```json

        {
          "number": "5511999999999",
          "type": "button",
          "text": "Escolha um produto:",
          "imageButton": "https://exemplo.com/produto1.jpg",
          "choices": [
            "Produto A|prod_a",
            "Mais Info|https://exemplo.com/produto-a",
            "Produto B|prod_b",
            "Ligar|call:+5511999999999"
          ],
          "footerText": "Produtos em destaque"
        }

        ```


        > **Suporte**: O campo `imageButton` aceita URLs ou imagens em base64.


        #### Exemplo Completo

        ```json

        {
          "number": "5511999999999",
          "type": "button",
          "text": "Como podemos ajudar?",
          "choices": [
            "Suporte Tecnico|suporte",
            "Fazer Pedido|pedido",
            "Nosso Site|https://exemplo.com",
            "Falar Conosco|call:+5511999999999"
          ],
          "footerText": "Escolha uma das opcoes abaixo"
        }

        ```


        #### Limitacoes e Compatibilidade

        > **Importante**: Ao combinar botoes de resposta com outros tipos (call, url, copy) na mesma mensagem, sera
        exibido o aviso: "Nao e possivel exibir esta mensagem no WhatsApp Web. Abra o WhatsApp no seu celular para
        visualiza-la."


        ### 2. Listas (type: "list")


        Cria menus organizados em secoes com itens selecionaveis.


        #### Campos Especificos

        - `listButton`: Texto do botao que abre a lista

        - `footerText`: Texto opcional do rodape

        - `choices`: Array com secoes e itens da lista


        #### Formato das Choices

        - `"[Titulo da Secao]"`: Inicia uma nova secao

        - `"texto|id|descricao"`: Item da lista com:
          - texto: Label do item
          - id: Identificador unico, opcional
          - descricao: Texto descritivo adicional e opcional

        #### Exemplo Completo

        ```json

        {
          "number": "5511999999999",
          "type": "list",
          "text": "Catalogo de Produtos",
          "choices": [
            "[Eletronicos]",
            "Smartphones|phones|Ultimos lancamentos",
            "Notebooks|notes|Modelos 2024",
            "[Acessorios]",
            "Fones|fones|Bluetooth e com fio",
            "Capas|cases|Protecao para seu device"
          ],
          "listButton": "Ver Catalogo",
          "footerText": "Precos sujeitos a alteracao"
        }

        ```


        ### 3. Enquetes (type: "poll")


        Cria enquetes interativas para votacao.


        #### Campos Especificos

        - `selectableCount`: Numero de opcoes que podem ser selecionadas (padrao: 1)

        - `choices`: Array simples com as opcoes de voto


        #### Exemplo Completo

        ```json

        {
          "number": "5511999999999",
          "type": "poll",
          "text": "Qual horario prefere para atendimento?",
          "choices": [
            "Manha (8h-12h)",
            "Tarde (13h-17h)",
            "Noite (18h-22h)"
          ],
          "selectableCount": 1
        }

        ```


        ### 4. Carousel (type: "carousel")


        Cria um carrossel de cartoes com imagens e botoes interativos.


        #### Campos Especificos

        - `choices`: Array com elementos do carrossel na seguinte ordem:
          - `[Texto do cartao]`: Texto do cartao entre colchetes
          - `{URL ou base64 da imagem}`: Imagem entre chaves
          - Botoes do cartao (um por linha):
            - `"texto|copy:codigo"` para botao de copiar
            - `"texto|https://url"` para botao de link
            - `"texto|call:+numero"` para botao de ligacao

        #### Exemplo Completo

        ```json

        {
          "number": "5511999999999",
          "type": "carousel",
          "text": "Conheca nossos produtos",
          "choices": [
            "[Smartphone XYZ\nO mais avancado smartphone da linha]",
            "{https://exemplo.com/produto1.jpg}",
            "Copiar Codigo|copy:PROD123",
            "Ver no Site|https://exemplo.com/xyz",
            "Fale Conosco|call:+5511999999999",
            "[Notebook ABC\nO notebook ideal para profissionais]",
            "{https://exemplo.com/produto2.jpg}",
            "Copiar Codigo|copy:NOTE456",
            "Comprar Online|https://exemplo.com/abc",
            "Suporte|call:+5511988888888"
          ]
        }

        ```


        > **Nota**: Criamos outro endpoint para carrossel: `/send/carousel`, funciona da mesma forma, mas com outro
        formato de payload. Veja o que e mais facil para voce.


        ## Termos de uso


        Os recursos de botoes interativos e listas podem ser descontinuados a qualquer momento sem aviso previo. Nao nos
        responsabilizamos por quaisquer alteracoes ou indisponibilidade destes recursos.


        ### Alternativas e Compatibilidade


        Considerando a natureza dinamica destes recursos, nosso endpoint foi projetado para facilitar a migracao entre
        diferentes tipos de mensagens (botoes, listas e enquetes).


        Recomendamos criar seus fluxos de forma flexivel, preparados para alternar entre os diferentes tipos.


        Em caso de descontinuidade de algum recurso, voce podera facilmente migrar para outro tipo de mensagem apenas
        alterando o campo "type" no payload, mantendo a mesma estrutura de choices.
