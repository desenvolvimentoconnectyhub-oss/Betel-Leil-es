  /provider/chat/find:
    post:
      summary: Busca chats com filtros
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Busca chats com diversos filtros e ordenacao. Suporta filtros em todos os campos do chat,

        paginacao e ordenacao customizada.


        Operadores de filtro:

        - `~` : LIKE (contem)

        - `!~` : NOT LIKE (nao contem)

        - `!=` : diferente

        - `>=` : maior ou igual

        - `>` : maior que

        - `<=` : menor ou igual

        - `<` : menor que

        - Sem operador: LIKE (contem)
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    operator:
                      type: string
                      enum:
                        - AND
                        - OR
                      default: AND
                      description: Operador logico entre os filtros
                    sort:
                      type: string
                      description: Campo para ordenacao (+/-campo). Ex -wa_lastMsgTimestamp
                    limit:
                      type: integer
                      description: Quantidade maxima de resultados a retornar
                      default: 20
                    offset:
                      type: integer
                      description: Numero de registros a pular (para paginacao)
                      default: 0
                    wa_fastid:
                      type: string
                    wa_chatid:
                      type: string
                    wa_archived:
                      type: boolean
                    wa_contactName:
                      type: string
                    wa_name:
                      type: string
                    name:
                      type: string
                    wa_isBlocked:
                      type: boolean
                    wa_isGroup:
                      type: boolean
                    wa_isGroup_admin:
                      type: boolean
                    wa_isGroup_announce:
                      type: boolean
                    wa_isGroup_member:
                      type: boolean
                    wa_isPinned:
                      type: boolean
                    wa_label:
                      type: string
                      description: ID da label aplicada ao chat. Use o valor retornado por `/labels`, nao o nome da etiqueta.
                    wa_notes:
                      type: string
                    lead_tags:
                      type: string
                    lead_isTicketOpen:
                      type: boolean
                    lead_assignedAttendant_id:
                      type: string
                    lead_status:
                      type: string
                  example:
                    operator: AND
                    sort: '-wa_lastMsgTimestamp'
                    limit: 50
                    offset: 0
                    wa_isGroup: true
                    lead_status: ~novo
                    wa_label: '10'
                    wa_notes: ~vip
      responses:
        '200':
          description: Lista de chats encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  chats:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chat'
                  totalChatsStats:
                    type: object
                    description: Contadores totais de chats
                  pagination:
                    type: object
                    properties:
                      totalRecords:
                        type: integer
                        description: Total de registros encontrados
                      limit:
                        type: integer
                        description: Limite aplicado na busca
                      offset:
                        type: integer
                        description: Offset usado para recuperar os resultados
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostChatFind
  /provider/chat/notes:
