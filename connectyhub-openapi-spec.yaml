    post:
      tags:
        - Enviar Mensagem
      summary: Enviar mensagem de texto
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Envia uma mensagem de texto para um contato, grupo ou canal/newsletter.


        ## Recursos Especificos


        - **Preview de links** com suporte a personalizacao automatica ou customizada

        - **Formatacao basica** do texto

        - **Substituicao automatica de placeholders** dinamicos


        ## Envio para Newsletter


        Para enviar texto para um canal, use o mesmo campo `number`, mas informe o JID completo do canal:

        - Exemplo: `120363123456789012@newsletter`


        ```json

        {
          "number": "120363123456789012@newsletter",
          "text": "Post publicado no canal"
        }

        ```


        ## Campos Comuns


        Este endpoint suporta todos os **campos opcionais comuns** documentados na tag **"Enviar Mensagem"**, incluindo:

        `delay`, `readchat`, `readmessages`, `replyid`, `mentions`, `forward`, `track_source`, `track_id`, placeholders
        e envio para grupos.


        ## Preview de Links


        ### Preview Automatico

        ```json

        {
          "number": "5511999999999",
          "text": "Confira: https://exemplo.com",
          "linkPreview": true
        }

        ```


        ### Preview Personalizado

        ```json

        {
          "number": "5511999999999",
          "text": "Confira nosso site! https://exemplo.com",
          "linkPreview": true,
          "linkPreviewTitle": "Titulo Personalizado",
          "linkPreviewDescription": "Uma descricao personalizada do link",
          "linkPreviewImage": "https://exemplo.com/imagem.jpg",
          "linkPreviewLarge": true
        }

        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: >-
                        ID do chat para o qual a mensagem sera enviada. Pode ser um numero de telefone em formato
                        internacional, um ID de grupo (`@g.us`), um ID de usuario (com `@s.whatsapp.net` ou `@lid`) ou
                        um ID de canal/newsletter (`@newsletter`).
                      example: '5511999999999'
                    text:
                      type: string
                      description: Texto da mensagem (aceita placeholders)
                      example: Ola {{name}}! Como posso ajudar?
                    linkPreview:
                      type: boolean
                      description: >
                        Ativa/desativa preview de links. Se true, procura automaticamente um link no texto para gerar
                        preview.


                        Comportamento:

                        - Se apenas linkPreview=true: gera preview automatico do primeiro link encontrado no texto

                        - Se fornecidos campos personalizados (title, description, image): usa os valores fornecidos

                        - Se campos personalizados parciais: combina com dados automaticos do link como fallback
                      example: true
                    linkPreviewTitle:
                      type: string
                      description: Define um titulo personalizado para o preview do link
                      example: Titulo Personalizado
                    linkPreviewDescription:
                      type: string
                      description: Define uma descricao personalizada para o preview do link
                      example: Descricao personalizada do link
                    linkPreviewImage:
                      type: string
                      description: URL ou Base64 da imagem para usar no preview do link
                      example: https://exemplo.com/imagem.jpg
                    linkPreviewLarge:
                      type: boolean
                      description: >-
                        Se true, gera um preview grande com upload da imagem. Se false, gera um preview pequeno sem
                        upload
                      example: true
                    replyid:
                      type: string
                      description: ID da mensagem para responder
                      example: 3EB0538DA65A59F6D8A251
                    mentions:
                      type: string
                      description: Numeros para mencionar (separados por virgula)
                      example: 5511999999999,5511888888888
                    readchat:
                      type: boolean
                      description: Marca conversa como lida apos envio
                      example: true
                    readmessages:
                      type: boolean
                      description: Marca ultimas mensagens recebidas como lidas
                      example: true
                    delay:
                      type: integer
                      description: Atraso em milissegundos antes do envio, durante o atraso apacera 'Digitando...'
                      example: 1000
                    forward:
                      type: boolean
                      description: Marca a mensagem como encaminhada no WhatsApp
                      example: true
                    track_source:
                      type: string
                      description: Origem do rastreamento da mensagem
                      example: chatwoot
                    track_id:
                      type: string
                      description: ID para rastreamento da mensagem (aceita valores duplicados)
                      example: msg_123456789
                    async:
                      type: boolean
                      description: >-
                        Se true, envia a mensagem de forma assincrona via fila interna. Util para alto volume de
                        mensagens.
                      example: false
                  required:
                    - number
                    - text
      responses:
        '200':
          description: Mensagem enviada com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Message'
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          status:
                            type: string
                            example: success
                          message:
                            type: string
                            example: Message sent successfully
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing number or text
        '401':
          description: Nao autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid token
        '429':
          description: Limite de requisicoes excedido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Rate limit exceeded
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: >-
                      WhatsApp server error 463: WhatsApp reported that the currently connected account is under a
                      temporary restriction for starting new conversations, usually related to sending volume or
