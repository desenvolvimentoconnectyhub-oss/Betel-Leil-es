                        type: string
                        description: ID logico do post editado.
                        example: 3EB0B4302B3A8A52F7A1
                      targetserverid:
                        type: integer
                        description: Identificador sequencial do post editado.
                        example: 12345
                      messageid:
                        type: string
                        description: ID da operacao de edicao enviada ao WhatsApp.
                        example: 3EB01234567890ABCDEF
                      serverid:
                        type: integer
                        description: Server id retornado pela operacao de edicao.
                        example: 12346
        '400':
          description: Payload invalido, mensagem nao editavel, mensagem alvo nao identificada ou canal invalido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: text is required
        '401':
          description: Instancia nao autenticada ou cliente nao encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: client not found
        '404':
          description: Mensagem do canal nao encontrada na janela recente consultada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: newsletter message not found in recent history
        '500':
          description: Erro interno ao consultar ou editar a mensagem do canal
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: connection closed
      security:
        - bearerAuth: []
