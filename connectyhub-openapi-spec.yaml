  /provider/send/media:
    post:
      tags:
        - Enviar Mensagem
      summary: Enviar midia (imagem, video, audio ou documento)
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Envia diferentes tipos de midia para um contato, grupo ou canal/newsletter. Suporta URLs ou arquivos base64.


        ## Tipos de Midia Suportados

        - **`image`**: Imagens (JPG preferencialmente)

        - **`video`**: Videos (apenas MP4)

        - **`videoplay`**: Video com comportamento visual de autoplay/loop no WhatsApp

        - **`document`**: Documentos (PDF, DOCX, XLSX, etc)

        - **`audio`**: Audio comum (MP3 ou OGG)

        - **`myaudio`**: Mensagem de voz (alternativa ao PTT)

        - **`ptt`**: Mensagem de voz (Push-to-Talk)

        - **`ptv`**: Mensagem de video (Push-to-Video)

        - **`sticker`**: Figurinha/Sticker


        ## Recursos Especificos

        - **Upload por URL ou base64**

        - **Caption/legenda** opcional com suporte a placeholders

        - **Nome personalizado** para documentos (`docName`)

        - **Geracao automatica de thumbnails**

        - **Compressao otimizada** conforme o tipo

        - **`viewOnce`** recomendado para midia compativel


        ## Envio para Newsletter


        Para enviar midia para um canal, use o mesmo campo `number`, mas informe o JID completo do canal:

        - Exemplo: `120363123456789012@newsletter`


        ```json

        {
          "number": "120363123456789012@newsletter",
          "type": "image",
          "file": "https://exemplo.com/foto.jpg",
          "text": "Imagem publicada no canal"
        }

        ```


        ## Campos Comuns


        Este endpoint suporta todos os **campos opcionais comuns** documentados na tag **"Enviar Mensagem"**, incluindo:

        `delay`, `readchat`, `readmessages`, `replyid`, `mentions`, `forward`, `track_source`, `track_id`, placeholders
        e envio para grupos.


        ## Exemplos Basicos


        ## Visualizacao Unica (`viewOnce`)


        O campo `viewOnce` e recomendado quando quiser midia de visualizacao unica e hoje produz efeito para os tipos:

        `image`, `video`, `videoplay`, `ptv`, `audio`, `myaudio` e `ptt`.


        Para `document`, `sticker` e demais endpoints de envio, o campo e ignorado silenciosamente.


        ### Imagem Simples

        ```json

        {
          "number": "5511999999999",
          "type": "image",
          "file": "https://exemplo.com/foto.jpg"
        }

        ```


        ### Documento com Nome

        ```json

        {
          "number": "5511999999999",
          "type": "document",
          "file": "https://exemplo.com/contrato.pdf",
          "docName": "Contrato.pdf",
          "text": "Segue o documento solicitado"
        }

        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: >-
                        ID do chat para o qual a mensagem sera enviada. Pode ser um numero de telefone em formato
                        internacional, um ID de grupo (`@g.us`), um ID de usuario (com `@s.whatsapp.net` ou `@lid`) ou
                        um ID de canal/newsletter (`@newsletter`).
                      example: '5511999999999'
                    type:
                      type: string
                      description: Tipo de midia (image, video, videoplay, document, audio, myaudio, ptt, ptv, sticker)
                      enum:
                        - image
                        - video
                        - videoplay
                        - document
                        - audio
                        - myaudio
                        - ptt
                        - ptv
                        - sticker
                      example: image
                    file:
                      type: string
                      description: URL ou base64 do arquivo
                      example: https://exemplo.com/imagem.jpg
                    text:
                      type: string
                      description: Texto descritivo (caption) - aceita placeholders
                      example: Veja esta foto!
                    docName:
                      type: string
                      description: Nome do arquivo (apenas para documents)
                      example: relatorio.pdf
                    thumbnail:
                      type: string
                      description: URL ou base64 de thumbnail personalizado para videos e documentos
                      example: https://exemplo.com/thumb.jpg
                    mimetype:
                      type: string
                      description: MIME type do arquivo (opcional, detectado automaticamente)
                      example: application/pdf
                    replyid:
                      type: string
                      description: ID da mensagem para responder
                      example: 3EB0538DA65A59F6D8A251
                    mentions:
                      type: string
                      description: Numeros para mencionar (separados por virgula)
                      example: 5511999999999,5511888888888
                    readchat:
                      type: boolean
                      description: Marca conversa como lida apos envio
                      example: true
                    readmessages:
                      type: boolean
                      description: Marca ultimas mensagens recebidas como lidas
                      example: true
                    delay:
                      type: integer
                      description: >-
                        Atraso em milissegundos antes do envio, durante o atraso apacera 'Digitando...' ou 'Gravando
                        audio...'
                      example: 1000
                    forward:
                      type: boolean
                      description: Marca a mensagem como encaminhada no WhatsApp
                      example: true
                    track_source:
                      type: string
                      description: Origem do rastreamento da mensagem
                      example: chatwoot
                    track_id:
                      type: string
                      description: ID para rastreamento da mensagem (aceita valores duplicados)
                      example: msg_123456789
                    async:
                      type: boolean
                      description: Se true, envia a mensagem de forma assincrona via fila interna
                      example: false
                    viewOnce:
                      type: boolean
                      description: >-
                        Recomendado para midia com visualizacao unica em tipos compativeis (`image`, `video`,
                        `videoplay`, `ptv`, `audio`, `myaudio`, `ptt`). Em tipos nao compativeis, o campo e ignorado
                        silenciosamente.
                      example: false
                  required:
                    - number
                    - type
                    - file
      responses:
