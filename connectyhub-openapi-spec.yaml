  /provider/instance/proxy:
    get:
      tags:
        - Avancado
      summary: Obter configuracao de proxy da instancia
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId como query string.


        A ConnectyHub distingue a intencao persistida do cliente (`mode`) do transporte efetivo em runtime
        (`effective_mode`).

        Isso evita degradar silenciosamente para conexao direta quando a instancia foi configurada para usar proxy.


        `mode` sempre sera:
          - `custom`: o cliente escolheu um proxy proprio;
          - `internal`: a instancia deve usar o pool interno ou a rota interna; ou
          - `none`: o cliente confirmou explicitamente que aceita conexao direta.

        `effective_mode` mostra o que esta sendo usado no momento:
          - `custom`
          - `internal`
          - `direct`

        `effective_detail` qualifica o transporte efetivo:
          - `managed_pool`: proxy interno gerenciado pela plataforma;
          - `internal_route`: rota interna dedicada do ambiente, sem uma `proxy_url` propria;
          - `relay`: tunel relay do cliente;
          - campo omitido: sem detalhe adicional.

        Quando um proxy customizado falha, a plataforma pode seguir uma cadeia de contingencia:
          1. `proxy_fallback` explicito, se configurado com outra URL;
          2. proxy interno;
          3. conexao direta como ultimo recurso, quando a politica permitir.

        Em qualquer fallback, a intencao persistida continua sendo `mode=custom`. O cliente deve olhar

        `effective_mode`, `effective_detail` e `fallback.active` para entender o estado runtime.


        Como ler cada campo da resposta:

        - `mode`: intencao salva na instancia. E o que o cliente pediu para usar.

        - `effective_mode`: transporte realmente em uso agora. Pode divergir de `mode` durante fallback.

        - `effective_detail`: detalhe extra do transporte efetivo. Use para distinguir pool interno, rota interna ou
        relay. Quando nao ha detalhe adicional, o campo e omitido.

        - `fallback.active`: `true` quando a instancia esta operando fora da rota principal configurada.

        - `fallback.reason`: motivo interno resumido do fallback atual. Serve para diagnostico e pode mudar conforme a
        causa.

        - `fallback.since`: timestamp Unix em milissegundos desde quando o fallback atual comecou.

        - `proxy_url`: proxy persistido na instancia, sempre mascarado. Se `mode=custom`, continua mostrando o proxy do
        cliente mesmo quando a sessao caiu em fallback.

        - `proxy_fallback`: politica persistida de contingencia para `mode=custom`. Pode ser `internal`, `never` ou
        outra URL de proxy.

        - `managed`: campo legado. Fica `true` quando a infraestrutura interna da plataforma esta envolvida no
        transporte atual ou pretendido.

        - `last_test_at`: timestamp Unix em milissegundos do ultimo teste ou da ultima falha persistida para esse proxy.

        - `last_test_error`: ultimo erro persistido para diagnostico. String vazia significa ausencia de erro salvo.

        - `validation_error`: atalho booleano para `last_test_error != ""`.


        Leitura rapida dos cenarios mais comuns:

        - `mode=custom` + `effective_mode=custom`: o proxy do cliente esta sendo usado normalmente.

        - `mode=custom` + `effective_mode=internal`: o proxy do cliente falhou e a sessao esta operando no fallback
        interno.

        - `mode=custom` + `effective_mode=direct`: o proxy do cliente falhou e a sessao caiu para conexao direta como
        ultimo recurso.

        - `mode=internal` + `effective_detail=managed_pool`: a instancia esta usando um proxy do pool interno.

        - `mode=internal` + `effective_detail=internal_route`: a instancia esta usando uma rota interna dedicada, sem
        `proxy_url` propria.

        - `mode=none` + `effective_mode=direct`: conexao direta assumida explicitamente.


        Combinacoes que nao devem aparecer numa resposta valida:

        - `mode=none` com `effective_mode=custom` ou `internal`

        - `effective_detail=managed_pool` com `effective_mode=custom`

        - `effective_detail=relay` com `effective_mode=internal` ou `direct`
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        '200':
          description: Configuracao de proxy recuperada com sucesso
          content:
            application/json:
              examples:
                custom_active:
                  summary: Proxy do cliente ativo
                  value:
                    mode: custom
                    effective_mode: custom
                    fallback:
                      active: false
                      reason: ''
                      since: 0
                    proxy_url: http://***:***@cliente-proxy.example:8080
                    proxy_fallback: internal
                    managed: false
                    last_test_at: 0
                    last_test_error: ''
                    validation_error: false
                custom_internal_fallback:
                  summary: Proxy do cliente falhou e a sessao subiu no proxy interno
                  value:
                    mode: custom
                    effective_mode: internal
                    effective_detail: managed_pool
                    fallback:
                      active: true
                      reason: custom_failed_internal:dial tcp timeout
                      since: 1760000000000
                    proxy_url: http://***:***@cliente-proxy.example:8080
                    proxy_fallback: internal
                    managed: true
                    last_test_at: 1760000000000
                    last_test_error: dial tcp timeout
                    validation_error: true
                custom_direct_fallback:
                  summary: Proxy do cliente falhou e a sessao caiu para direto como ultimo recurso
                  value:
                    mode: custom
                    effective_mode: direct
                    fallback:
                      active: true
                      reason: custom_failed_direct:dial tcp timeout
                      since: 1760000005000
                    proxy_url: http://***:***@cliente-proxy.example:8080
                    proxy_fallback: internal
                    managed: false
                    last_test_at: 1760000005000
                    last_test_error: dial tcp timeout
                    validation_error: true
                internal_dedicated_route:
                  summary: Modo interno usando rota interna dedicada
                  value:
                    mode: internal
                    effective_mode: internal
                    effective_detail: internal_route
                    fallback:
                      active: false
                      reason: ''
                      since: 0
                    proxy_url: ''
                    proxy_fallback: internal
                    managed: true
                    last_test_at: 0
                    last_test_error: ''
                    validation_error: false
              schema:
                type: object
                example:
                  mode: custom
                  effective_mode: internal
                  effective_detail: managed_pool
                  fallback:
                    active: true
                    reason: custom_failed_internal:dial tcp timeout
                    since: 1760000000000
                  proxy_url: http://***:***@cliente-proxy.example:8080
                  proxy_fallback: internal
                  managed: true
                  last_test_at: 1760000000000
                  last_test_error: dial tcp timeout
                  validation_error: true
                properties:
                  mode:
                    type: string
                    enum:
                      - custom
                      - internal
                      - none
                    description: >-
                      Intencao persistida do cliente. Representa o modo salvo na instancia, nao necessariamente o
                      transporte em uso agora.
                    example: custom
                  effective_mode:
                    type: string
                    enum:
                      - custom
                      - internal
                      - direct
                    description: >-
                      Transporte efetivo em runtime. E o valor principal para entender por onde a sessao esta saindo
                      neste momento.
                    example: internal
                  effective_detail:
                    type: string
                    enum:
                      - managed_pool
                      - internal_route
                      - relay
                    description: |
                      Detalhe opcional do transporte atual.
                      `managed_pool` = proxy interno gerenciado.
                      `internal_route` = rota interna dedicada do ambiente.
                      `relay` = tunel relay do cliente.
                      Quando nao ha detalhe adicional, o campo e omitido.
                    example: managed_pool
                  fallback:
                    type: object
                    description: >-
                      Estado do fallback runtime. So fica ativo quando a instancia precisou sair da rota principal
                      configurada.
                    properties:
                      active:
                        type: boolean
                        description: Indica se a instancia esta operando em fallback neste momento.
                        example: true
                      reason:
                        type: string
                        description: Motivo interno resumido do fallback atual, util para observabilidade e suporte.
                        example: custom_failed_internal:dial tcp timeout
                      since:
                        type: integer
                        description: Timestamp Unix em milissegundos desde quando o fallback atual esta ativo.
                        example: 1760000000000
                  proxy_url:
                    type: string
                    description: >-
                      URL mascarada do proxy persistido. Em fallback de proxy custom, continua mostrando a URL do
                      cliente; nao troca para o proxy efetivo de contingencia.
                    example: http://***:***@cliente-proxy.example:8080
                  proxy_fallback:
                    type: string
                    description: |
                      Politica de contingencia persistida para `mode=custom`.
                      Valores aceitos:
                        - `internal`
                        - `never`
                        - uma URL de proxy HTTP/HTTPS/SOCKS para contingencia explicita
                    example: internal
                  managed:
                    type: boolean
                    description: >-
                      Campo legado indicando participacao da infraestrutura interna. Pode ficar `true` tanto em
                      `mode=internal` quanto em fallback interno de `mode=custom`.
                    example: true
                  last_test_at:
                    type: integer
                    description: Timestamp Unix em milissegundos do ultimo teste ou da ultima falha persistida.
                    example: 1760000000000
                  last_test_error:
                    type: string
                    description: Ultimo erro persistido para diagnostico. String vazia significa ausencia de erro salvo.
                    example: dial tcp timeout
                  validation_error:
                    type: boolean
                    description: Indica se `last_test_error` esta preenchido.
                    example: true
        '401':
          description: Chave invalida ou expirada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        '500':
          description: Erro interno do servidor ao recuperar a configuracao
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem detalhando o erro encontrado
      parameters:
        - name: instanceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Obrigatorio em chamadas GET.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerGetInstanceProxy
    post:
      tags:
        - Avancado
      summary: Configurar ou alterar o proxy
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Define explicitamente um dos tres estados aceitos:
          - `mode=custom`: usa um proxy proprio informado em `proxy_url`;
          - `mode=internal`: usa a infraestrutura interna; ou
          - `mode=none`: conexao direta, permitida apenas com `confirm_no_proxy=true`.

        Importante: `POST /instance/proxy` confirma que a configuracao foi salva, nao que o proxy ja foi comprovado em
        uso.

        A validacao operacional principal acontece no proximo ciclo real de conexao da instancia.


        Em termos praticos:
          - `200 OK` aqui = configuracao persistida com sucesso;
          - falhas reais de conectividade podem aparecer depois; e
          - para observar o estado real, consulte `GET /instance/proxy` e leia:
            - `effective_mode`
            - `effective_detail`
            - `fallback.active`
            - `last_test_error`
            - `validation_error`

        Quando `mode=custom`, voce tambem pode definir a contingencia via `proxy_fallback`:
          - `internal`: tenta a infraestrutura interna e, se ainda assim falhar, pode usar direto como ultimo recurso;
          - `never`: nao usa contingencia; ou
          - uma URL de proxy de contingencia controlada pelo proprio cliente.

        Quando `mode=internal`, `rotate_now: true` troca imediatamente o proxy interno persistido.

        Se houver mais de uma origem interna disponivel, a plataforma escolhe outra origem sem expor o fornecedor.

        Se houver apenas uma origem, troca apenas o proxy/IP dentro dessa origem.


        Protocolos aceitos em URLs de proxy customizado:
          - `http://usuario:senha@host:porta`
          - `https://usuario:senha@host:porta`
          - `socks5://usuario:senha@host:porta`
          - `socks5h://usuario:senha@host:porta`

        O esquema `socks://` generico nao e aceito. Para proxies SOCKS, use `socks5://` ou `socks5h://`.
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum:
                        - custom
                        - internal
                        - none
                      description: Campo canonico para definir a estrategia de proxy.
                    proxy_url:
                      type: string
                      description: |
                        Obrigatorio quando `mode=custom`.
                        Protocolos aceitos: `http://`, `https://`, `socks5://` e `socks5h://`.
                        O esquema `socks://` generico nao e suportado; use `socks5://` ou `socks5h://`.
                      example: http://usuario:senha@ip:porta
                    proxy_fallback:
                      type: string
                      description: >
                        Politica de contingencia para `mode=custom`.

                        Aceita `internal`, `never` ou uma URL de proxy de contingencia usando `http://`, `https://`,
                        `socks5://` ou `socks5h://`.
                    confirm_no_proxy:
                      type: boolean
                      description: Obrigatorio quando `mode=none`.
                    rotate_now:
                      type: boolean
                      description: >-
                        Quando `true` com `mode=internal`, troca imediatamente o proxy interno persistido sem expor o
                        fornecedor usado.
                      default: false
      responses:
        '200':
          description: Proxy configurado com sucesso
          content:
            application/json:
              examples:
                custom_internal_fallback_saved:
                  summary: Configuracao salva; o uso real sera confirmado no proximo ciclo de conexao
                  value:
                    details: Proxy configurado
                    proxy:
                      mode: custom
                      effective_mode: custom
                      fallback:
                        active: false
                        reason: ''
                        since: 0
                      proxy_url: http://***:***@proxy-do-cliente.example:8080
                      proxy_fallback: internal
                      managed: false
                      last_test_at: 0
                      last_test_error: ''
                      validation_error: false
                    restart_requested: true
                after_connect_failure_example:
                  summary: Exemplo do que o GET pode mostrar depois se o proxy salvo falhar
                  value:
                    details: Proxy configurado
                    proxy:
                      mode: custom
                      effective_mode: custom
                      fallback:
                        active: false
                        reason: ''
                        since: 0
                      proxy_url: http://***:***@proxy-do-cliente.example:8080
                      proxy_fallback: internal
                      managed: false
                      last_test_at: 0
                      last_test_error: ''
                      validation_error: false
                    restart_requested: true
                direct_explicit:
                  summary: Direto explicito
                  value:
                    details: Proxy configurado
                    proxy:
                      mode: none
                      effective_mode: direct
                      fallback:
                        active: false
                        reason: ''
                        since: 0
                      proxy_url: ''
                      proxy_fallback: internal
                      managed: false
                      last_test_at: 0
                      last_test_error: ''
                      validation_error: false
                internal_rotated:
                  summary: Proxy interno rotacionado
                  value:
                    details: Proxy configurado
                    rotated: true
                    proxy:
                      mode: internal
                      effective_mode: internal
                      effective_detail: managed_pool
                      fallback:
                        active: false
                        reason: ''
                        since: 0
                      proxy_url: managed_pool://hidden
                      proxy_fallback: internal
                      managed: true
                      last_test_at: 0
                      last_test_error: ''
                      validation_error: false
              schema:
                type: object
                example:
                  details: Proxy configurado
                  proxy:
                    mode: custom
                    effective_mode: custom
                    fallback:
                      active: false
                      reason: ''
                      since: 0
                    proxy_url: http://***:***@proxy-do-cliente.example:8080
                    proxy_fallback: internal
                    managed: false
                    last_test_at: 0
                    last_test_error: ''
                    validation_error: false
                  restart_requested: true
                properties:
                  details:
                    type: string
                    example: Proxy configurado
                  proxy:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum:
                          - custom
                          - internal
                          - none
                        description: Intencao persistida do cliente apos a gravacao.
                      effective_mode:
                        type: string
                        enum:
                          - custom
                          - internal
                          - direct
                        description: Transporte efetivo no momento da resposta.
                      effective_detail:
                        type: string
                        enum:
                          - managed_pool
                          - internal_route
                          - relay
                        description: >-
                          Detalhe complementar do transporte efetivo. Quando nao ha detalhe adicional, o campo e
                          omitido.
                      fallback:
                        type: object
                        description: Estado do fallback runtime.
                        properties:
                          active:
                            type: boolean
                            description: Indica se a instancia esta operando em fallback neste momento.
                          reason:
                            type: string
                            description: Motivo interno resumido do fallback atual.
                          since:
                            type: integer
                            description: Timestamp Unix em milissegundos desde quando o fallback atual esta ativo.
                      proxy_url:
                        type: string
                        description: URL mascarada do proxy persistido.
                      proxy_fallback:
                        type: string
                        description: Politica de contingencia persistida para `mode=custom`.
                      managed:
                        type: boolean
                        description: Campo legado ligado ao uso da infraestrutura interna.
                      last_test_at:
                        type: integer
                        description: Timestamp do ultimo teste/erro persistido.
                      last_test_error:
                        type: string
                        description: Ultimo erro persistido para diagnostico.
                      validation_error:
                        type: boolean
                        description: Indica se `last_test_error` esta preenchido.
                  restart_requested:
                    type: boolean
                    description: Indica se uma reinicializacao da conexao foi solicitada para aplicar o proxy.
                  rotated:
                    type: boolean
                    description: Presente como `true` quando `rotate_now` troca o proxy interno com sucesso.
        '400':
          description: Payload invalido ou falha na validacao do proxy
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: confirm_no_proxy e obrigatorio para desabilitar proxy
        '401':
          description: Chave invalida ou expirada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        '409':
          description: Nao ha proxy alternativo disponivel para rotacao interna
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'nao foi possivel rotacionar proxy interno: nenhum proxy alternativo disponivel para rotacao'
        '500':
          description: Erro interno do servidor ao configurar o proxy
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem detalhando o erro encontrado
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostInstanceProxy
  /provider/proxy-managed/cities:
    get:
      tags:
        - Avancado
      summary: Proxy Interno - Listar cidades disponiveis
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId como query string.


        Retorna a lista de cidades disponiveis para uso nos campos

        `proxy_managed_country`, `proxy_managed_state` e `proxy_managed_city` do endpoint

        `POST /instance/connect`.


        O backend consulta o catalogo disponivel e aplica um cache interno de 24 horas.

        Se o catalogo de cidades nao estiver disponivel, o endpoint retorna erro.


        - Autenticacao: requer `token` valido de qualquer instancia (ou credencial interna via instancia).

        - Query `country` (opcional): ISO alpha-2 minusculo. Default `br`.

        - Query `state` (opcional): UF/subdivisao minuscula, como `sp`.

        - Query `search` (opcional): filtro parcial por nome/slug, insensivel a acento/caixa.


        Como escolher a cidade:

        1. Use `br` em `proxy_managed_country`.

        2. Chame `GET /proxy-managed/cities?country=br` para obter as cidades brasileiras.

        3. Quando a cidade retornar `state`, envie tambem esse valor em `proxy_managed_state`.

        4. Quando o usuario escolher uma cidade, envie em `/instance/connect`:
           - `proxy_managed_country`: o pais escolhido, ex. `br`
           - `proxy_managed_state`: o `state` retornado pela cidade, ex. `sp`, quando disponivel
           - `proxy_managed_city`: sempre o `cities[].value`

        Se `state` nao vier na cidade selecionada, envie apenas `proxy_managed_country` e `proxy_managed_city`.

        O backend valida a combinacao e retorna erro se faltar algum dado necessario.


        Exemplo de requisicao:

        ```

        GET /proxy-managed/cities?country=br&state=sp&search=camp

        ```
      parameters:
        - name: instanceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Obrigatorio em chamadas GET.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
        - in: query
          name: country
          required: false
          schema:
            type: string
            pattern: ^[a-z]{2}$
            default: br
          description: ISO alpha-2 (minusculo). Default `br`.
        - in: query
          name: state
          required: false
          schema:
            type: string
            pattern: ^[a-z0-9-]{1,16}$
          description: Filtra por UF/subdivisao quando o catalogo traz `state`. Para Brasil, use valores como `sp`, `rj`, `mg`.
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Filtro parcial por nome/slug (insensivel a acento/caixa).
      responses:
        '200':
          description: Lista de cidades disponiveis
          content:
            application/json:
