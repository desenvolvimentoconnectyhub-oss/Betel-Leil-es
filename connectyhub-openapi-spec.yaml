  /provider/group/updateAnnounce:
    post:
      tags:
        - Grupos e Comunidades
      summary: Configurar permissoes de envio de mensagens no grupo
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Define as permissoes de envio de mensagens no grupo, permitindo restringir o envio apenas para administradores.


        Quando ativado (announce=true):

        - Apenas administradores podem enviar mensagens

        - Outros participantes podem apenas ler

        - Util para anuncios importantes ou controle de spam


        Quando desativado (announce=false):

        - Todos os participantes podem enviar mensagens

        - Configuracao padrao para grupos normais


        Requer que o usuario seja administrador do grupo para fazer alteracoes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    groupjid:
                      type: string
                      description: Identificador unico do grupo no formato xxxx@g.us
                      example: 120363339858396166@g.us
                    announce:
                      type: boolean
                      description: Controla quem pode enviar mensagens no grupo
                      example: true
                  required:
                    - groupjid
                    - announce
      responses:
        '200':
          description: Configuracao atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group announce enabled successfully
                  group:
                    $ref: '#/components/schemas/Group'
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '401':
          description: Token de autenticacao ausente ou invalido
        '403':
          description: Usuario nao e administrador do grupo
        '404':
          description: Grupo nao encontrado
        '500':
          description: Erro interno do servidor ou falha na API do WhatsApp
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostGroupUpdateAnnounce
