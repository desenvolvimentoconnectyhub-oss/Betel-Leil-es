                    provider_message_ptbr: >-
                      O WhatsApp informou que a conta atualmente conectada esta sob uma restricao temporaria para
                      iniciar novas conversas, normalmente relacionada a volume ou qualidade de envios.
                    diagnostics_endpoint: /instance/wa_messages_limits
                    details:
                      new_chat_message_capping:
