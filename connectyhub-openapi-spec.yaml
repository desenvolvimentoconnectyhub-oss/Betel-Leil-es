  /provider/chat/details:
    post:
      tags:
        - Contatos
      summary: Obter Detalhes Completos
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Retorna informacoes **completas** sobre um contato ou chat, incluindo **todos os campos disponiveis** do modelo
        Chat.


        ### Funcionalidades:

        - **Retorna chat completo**: Todos os campos do modelo Chat (mais de 60 campos)

        - **Busca informacoes para contatos individuais e grupos**

        - **URLs de imagem em dois tamanhos**: preview (menor) ou full (original)

        - **Combina informacoes de diferentes fontes**: WhatsApp, contatos salvos, leads

        - **Atualiza automaticamente dados desatualizados** no banco


        ### Campos Retornados:

        - **Informacoes basicas**: id, wa_fastid, wa_chatid, owner, name, phone

        - **Dados do WhatsApp**: wa_name, wa_contactName, wa_archived, wa_isBlocked, etc.

        - **Dados de lead/CRM**: lead_name, lead_email, lead_status, lead_field01-20, etc.

        - **Informacoes de grupo**: wa_isGroup, wa_isGroup_admin, wa_isGroup_announce, etc.

        - **Chatbot**: chatbot_summary, chatbot_lastTrigger_id, chatbot_disableUntil, etc.

        - **Configuracoes**: wa_muteEndTime, wa_isPinned, wa_unreadCount, etc.


        **Comportamento**:

        - Para contatos individuais:
          - Busca nome verificado do WhatsApp
          - Verifica nome salvo nos contatos
          - Formata numero internacional
          - Calcula grupos em comum
        - Para grupos:
          - Busca nome do grupo
          - Verifica status de comunidade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: Numero do telefone ou ID do grupo
                      example: '5511999999999'
                    preview:
                      type: boolean
                      description: |
                        Controla o tamanho da imagem de perfil retornada:
                        - `true`: Retorna imagem em tamanho preview (menor, otimizada para listagens)
                        - `false` (padrao): Retorna imagem em tamanho full (resolucao original, maior qualidade)
                      default: false
                  required:
                    - number
      responses:
        '200':
          description: Informacoes completas do chat retornadas com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Chat'
                  - type: object
                    properties:
                      common_groups:
                        type: string
                        description: 'Grupos em comum separados por virgula, formato: nome_grupo(id_grupo)'
                        example: Grupo Familia(120363123456789012@g.us),Trabalho(987654321098765432@g.us)
                      imagePreview:
                        type: string
                        description: URL da imagem de perfil em tamanho preview (menor) - apenas se preview=true
                      image:
                        type: string
                        description: URL da imagem de perfil em tamanho full (resolucao original) - apenas se preview=false
              examples:
                contact_example:
                  summary: Contato individual
                  description: Exemplo de resposta para um contato individual
                  value:
                    id: r1a2b3c4d5e6f7
                    wa_fastid: admin:5511999999999
                    wa_chatid: 5511999999999@s.whatsapp.net
                    wa_name: Joao Silva
                    name: Joao Silva
                    phone: +55 11 99999-9999
                    owner: admin
                    wa_archived: false
                    wa_isBlocked: false
                    wa_isGroup: false
                    lead_name: Joao
                    lead_fullName: Joao Silva
                    lead_email: joao@exemplo.com
