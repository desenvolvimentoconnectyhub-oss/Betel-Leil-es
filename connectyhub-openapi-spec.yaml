        **Importante - Diferenca entre Status e Broadcast:**


        - **Status**: Refere-se ao recado personalizado que aparece embaixo do nome do usuario (ex: "Disponivel",
        "Ocupado", texto personalizado)

        - **Broadcast**: Refere-se ao envio de "stories/reels" (fotos/videos temporarios)


        **Limitacao**: As configuracoes de privacidade do broadcast (stories/reels) nao estao disponiveis para alteracao
        via API.


        **Caracteristicas:**

        -  **Eficiencia**: Altera apenas configuracoes que realmente mudaram

        -  **Flexibilidade**: Pode alterar uma ou multiplas configuracoes na mesma requisicao

        -  **Feedback completo**: Retorna todas as configuracoes atualizadas


        **Formato de entrada:**

        ```json

        {
          "groupadd": "contacts",
          "last": "none",
          "status": "contacts"
        }

        ```


