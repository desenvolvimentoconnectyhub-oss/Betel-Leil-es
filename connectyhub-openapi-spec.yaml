        Verifica se numeros fornecidos estao registrados no WhatsApp e retorna informacoes detalhadas.


        ### Funcionalidades:

        - Verifica multiplos numeros simultaneamente

        - Suporta numeros individuais e IDs de grupo

        - Retorna nome verificado quando disponivel

        - Identifica grupos e comunidades

        - Verifica subgrupos de comunidades


        **Comportamento especifico**:

        - Para numeros individuais:
          - Verifica registro no WhatsApp
          - Retorna nome verificado se disponivel
          - Normaliza formato do numero
        - Para grupos:
          - Verifica existencia
          - Retorna nome do grupo
          - Retorna id do grupo de anuncios se buscado por id de comunidade
