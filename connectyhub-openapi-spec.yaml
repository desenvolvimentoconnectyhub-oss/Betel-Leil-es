  /provider/chat/labels:
    post:
      summary: Gerencia labels de um chat
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Atualiza as labels associadas a um chat especifico. Este endpoint oferece tres modos de operacao:


        1. **Definir todas as labels** (labelids): Define o conjunto completo de labels para o chat, substituindo labels
        existentes

        2. **Adicionar uma label** (add_labelid): Adiciona uma unica label ao chat sem afetar as existentes

        3. **Remover uma label** (remove_labelid): Remove uma unica label do chat sem afetar as outras


        **Importante**: Use apenas um dos tres parametros por requisicao. Labels inexistentes serao rejeitadas.


        As labels devem ser fornecidas no formato id ou labelid encontradas na funcao get labels.
      tags:
        - Etiquetas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: Numero do chat ou grupo
                      example: '5511999999999'
                    labelids:
                      type: array
                      items:
                        type: string
                      description: Lista de IDs das labels a serem aplicadas ao chat (define todas as labels)
                      example:
                        - '10'
                        - '20'
                    add_labelid:
                      type: string
                      description: ID da label a ser adicionada ao chat
                      example: '10'
                    remove_labelid:
                      type: string
                      description: ID da label a ser removida do chat
                      example: '20'
                  required:
                    - number
                  oneOf:
                    - required:
                        - labelids
                    - required:
                        - add_labelid
                    - required:
                        - remove_labelid
      responses:
        '200':
          description: Labels atualizadas com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de confirmacao
                  editions:
                    type: array
                    items:
                      type: string
                    description: Lista de operacoes realizadas (apenas para operacao labelids)
              examples:
                definir_todas_labels:
                  summary: Resposta para definir todas as labels
                  value:
                    response: Labels updated successfully
                    editions:
                      - Added label 10 to chat
                      - Added label 20 to chat
                      - Removed label 5 from chat
                adicionar_label:
                  summary: Resposta para adicionar uma label
                  value:
                    response: Label added to chat
                remover_label:
                  summary: Resposta para remover uma label
                  value:
                    response: Label removed from chat
        '400':
          description: Erro na requisicao
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Use only one operation: labelids, add_labelid, or remove_labelid'
        '404':
          description: Chat nao encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Chat not found
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostChatLabels
  /provider/chat/delete:
    post:
      summary: Deleta chat
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Deleta ou limpa um chat e/ou suas mensagens do WhatsApp e/ou banco de dados.

        Voce pode escolher:

        - Deletar o chat do WhatsApp

        - Limpar a conversa no WhatsApp

        - Deletar o chat do banco de dados

        - Deletar apenas as mensagens do banco de dados

        - Qualquer combinacao das opcoes acima

        Observacao:

        - Se clearChatWhatsApp e deleteChatWhatsApp forem true, o clear tem prioridade.
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: |
                        Numero do chat no formato internacional.
                        Para grupos use o ID completo do grupo.
                      example: '5511999999999'
                    deleteChatDB:
                      type: boolean
                      description: Se true, deleta o chat do banco de dados
                      default: false
                      example: true
                    deleteMessagesDB:
                      type: boolean
                      description: Se true, deleta todas as mensagens do chat do banco de dados
                      default: false
                      example: true
                    deleteChatWhatsApp:
                      type: boolean
                      description: |
                        Se true, deleta o chat do WhatsApp.
                        Para grupos, esta operacao nao e permitida e o chat sera apenas limpo.
                      default: false
                      example: true
                    clearChatWhatsApp:
                      type: boolean
                      description: |
                        Se true, limpa a conversa do chat no WhatsApp (sem sair do chat).
                        Funciona para grupos e conversas individuais.
                      default: false
                      example: true
                  required:
                    - number
      responses:
        '200':
          description: Operacao realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de sucesso
                    example: Chat deletion process completed
                  actions:
                    type: array
                    description: Lista de acoes realizadas
                    items:
                      type: string
                    example:
                      - Chat deleted from WhatsApp
                      - Chat deleted from database
                      - 'Messages associated with chat deleted from database: 42'
                  errors:
                    type: array
                    description: Lista de erros ocorridos, se houver
                    items:
                      type: string
                    example:
                      - 'Error deleting chat from WhatsApp: connection timeout'
        '400':
          description: Erro nos parametros da requisicao
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing number in payload
        '401':
          description: Token invalido ou nao fornecido
        '404':
          description: Chat nao encontrado
        '500':
          description: Erro interno do servidor
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostChatDelete
  /provider/chat/archive:
