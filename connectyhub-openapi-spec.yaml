  /provider/chat/ephemeral:
    post:
      summary: Configurar mensagens temporarias em chat privado
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Define o temporizador de mensagens temporarias (disappearing messages) de um chat privado.


        Valores aceitos para a duracao:

        - `0` ou `off` para desativar

        - `1d`

        - `7d`

        - `90d`


        Observacoes:

        - este endpoint e apenas para chats privados

        - se o identificador informado for de grupo, a API retorna erro orientando usar `/group/ephemeral`

        - a resposta tambem atualiza o `wa_ephemeralExpiration` do chat no cache local
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  required:
                    - number
                    - duration
                  properties:
                    number:
                      type: string
                      description: Identificador do chat privado
                      example: 5511999999999@s.whatsapp.net
                    duration:
                      oneOf:
                        - type: string
                        - type: integer
                      description: Duracao desejada para mensagens temporarias
                      example: 7d
      responses:
        '200':
          description: Temporizador atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Ephemeral timer updated successfully
                  chat:
                    $ref: '#/components/schemas/Chat'
                  ephemeral:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        example: true
                      seconds:
                        type: integer
                        format: int64
                        example: 604800
                      label:
                        type: string
                        example: 7d
              examples:
                sucesso:
                  summary: Timer atualizado
                  value:
                    response: Ephemeral timer updated successfully
                    chat:
                      wa_chatid: 5511999999999@s.whatsapp.net
                      wa_ephemeralExpiration: 604800
                      wa_isGroup: false
                    ephemeral:
                      enabled: true
                      seconds: 604800
                      label: 7d
        '400':
          description: Payload invalido, chat invalido ou duracao nao suportada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'invalid duration. Allowed values: 0, off, 1d, 7d, 90d'
        '401':
          description: Token invalido ou ausente
        '500':
          description: Erro interno ao atualizar o temporizador
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Error updating chat ephemeral timer: connection closed'
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostChatEphemeral
  /provider/chat/read:
    post:
      summary: Marcar chat como lido/nao lido
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Atualiza o status de leitura de um chat no WhatsApp.


        Quando um chat e marcado como lido:

        - O contador de mensagens nao lidas e zerado

        - O indicador visual de mensagens nao lidas e removido

        - O remetente recebe confirmacao de leitura (se ativado)


        Quando marcado como nao lido:

        - O chat aparece como pendente de leitura

        - Nao afeta as confirmacoes de leitura ja enviadas
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  required:
                    - number
                    - read
                  properties:
                    number:
                      type: string
                      description: |
                        Identificador do chat no formato:
                        - Para usuarios: [numero]@s.whatsapp.net (ex: 5511999999999@s.whatsapp.net)
                        - Para grupos: [id-grupo]@g.us (ex: 123456789-987654321@g.us)
                      example: 5511999999999@s.whatsapp.net
                    read:
                      type: boolean
                      description: |
                        - true: marca o chat como lido
                        - false: marca o chat como nao lido
      responses:
        '200':
          description: Status de leitura atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Chat read status updated successfully
        '401':
          description: Token de autenticacao ausente ou invalido
        '404':
          description: Chat nao encontrado
        '500':
          description: Erro ao atualizar status de leitura
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostChatRead
  /provider/chat/mute:
    post:
      summary: Silenciar chat
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Silencia notificacoes de um chat por um periodo especifico.

        As opcoes de silenciamento sao:

        * 0 - Remove o silenciamento

        * 8 - Silencia por 8 horas

        * 168 - Silencia por 1 semana (168 horas)

        * -1 - Silencia permanentemente
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
