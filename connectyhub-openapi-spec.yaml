  /provider/group/updateParticipants:
    post:
      tags:
        - Grupos e Comunidades
      summary: Gerenciar participantes do grupo
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Gerencia participantes do grupo atraves de diferentes acoes:

        - Adicionar ou remover participantes

        - Promover ou rebaixar administradores

        - Aprovar ou rejeitar solicitacoes pendentes


        Requer que o usuario seja administrador do grupo para executar as acoes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    groupjid:
                      type: string
                      description: JID (identificador) do grupo
                      example: 120363308883996631@g.us
                    action:
                      type: string
                      description: |
                        Acao a ser executada:
                        - add: Adicionar participantes ao grupo
                        - remove: Remover participantes do grupo
                        - promote: Promover participantes a administradores
                        - demote: Remover privilegios de administrador
                        - approve: Aprovar solicitacoes pendentes de entrada
                        - reject: Rejeitar solicitacoes pendentes de entrada
                      enum:
                        - add
                        - remove
                        - promote
                        - demote
                        - approve
                        - reject
                      example: promote
                    participants:
                      type: array
                      items:
                        type: string
                      description: |
                        Lista de numeros de telefone ou JIDs dos participantes.
                        Para numeros de telefone, use formato internacional sem '+' ou espacos.
                      example:
                        - '5521987654321'
                        - '5511999887766'
                  required:
                    - groupjid
                    - action
                    - participants
      responses:
        '200':
          description: Sucesso na operacao
          content:
            application/json:
              schema:
                type: object
                properties:
                  groupUpdated:
                    type: array
                    items:
                      type: object
                      properties:
                        JID:
                          type: string
                          description: JID do participante
                        Error:
                          type: integer
                          description: Codigo de erro (0 para sucesso)
                    description: Status da operacao para cada participante
                  group:
                    $ref: '#/components/schemas/Group'
                    description: Informacoes atualizadas do grupo
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '400':
          description: Erro nos parametros da requisicao
        '403':
          description: Usuario nao e administrador do grupo
        '500':
          description: Erro interno do servidor
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostGroupUpdateParticipants
