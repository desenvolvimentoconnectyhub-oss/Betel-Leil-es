  /provider/newsletter/messages:
    post:
      tags:
        - Newsletters e Canais
      summary: Buscar mensagens de um canal
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Busca diretamente no WhatsApp os posts/mensagens de um canal (newsletter).


        Esta rota nao depende de mensagens salvas localmente e e util para:

        - carregar o historico recente de posts de um canal

        - paginar mensagens anteriores usando `beforeid`

        - consumir conteudo de newsletters sem persistencia em banco


        Identificacao do canal:

        - envie `id` com o identificador numerico do canal; o backend converte para `@newsletter`

        - ou envie `jid` completo no formato `1234567890@newsletter`


        Observacoes:

        - `count` controla quantos posts retornar

        - use preferencialmente `beforeid`

        - `beforeid` pagina para tras a partir de um `serverid`

        - o retorno vem no campo `response`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    id:
                      type: string
                      description: ID numerico do canal. Se informado sem dominio, sera convertido para `@newsletter`.
                      example: '120363123456789012'
                    jid:
                      type: string
                      description: JID completo do canal.
                      example: 120363123456789012@newsletter
                    count:
                      type: integer
                      minimum: 1
                      description: Quantidade de mensagens/posts a buscar.
                      example: 20
                    beforeid:
                      type: integer
                      minimum: 1
                      description: |
                        Retorna mensagens anteriores ao `serverid` informado.
                        Use para paginacao retroativa.
                      example: 12345
      responses:
        '200':
          description: Mensagens do canal recuperadas com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: array
                    description: Lista de mensagens/posts do canal retornados diretamente pelo WhatsApp.
                    items:
                      type: object
                      properties:
                        serverid:
                          type: integer
                          description: Identificador sequencial do post no canal.
                          example: 12345
                        messageid:
                          type: string
                          description: ID logico da mensagem.
                          example: 3EB0B4302B3A8A52F7A1
                        type:
                          type: string
                          description: Tipo da mensagem do canal.
                          example: text
                        timestamp:
                          type: string
                          format: date-time
                          description: Momento em que o post foi publicado.
                        viewsCount:
                          type: integer
                          description: Quantidade de visualizacoes conhecida no momento da consulta.
                          example: 1200
                        reactionCounts:
                          type: object
                          additionalProperties:
                            type: integer
                          description: Mapa de emoji para quantidade de reacoes.
                          example:
                            👍: 22
                            🔥: 7
                        message:
                          type: object
                          description: Conteudo bruto da mensagem retornado pelo WhatsApp quando disponivel.
                          additionalProperties: true
              examples:
                sucesso:
                  value:
                    response:
                      - messageid: 3EB0B4302B3A8A52F7A1
                        serverid: 12345
                        type: text
                        timestamp: '2026-03-24T18:20:00Z'
                        viewsCount: 1200
                        reactionCounts:
                          👍: 22
                          🔥: 7
                        message:
                          conversation: Post do canal
        '400':
          description: Payload invalido ou ID/JID do canal invalido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid newsletter id
        '401':
          description: Instancia nao autenticada ou cliente nao encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: client not found
        '500':
          description: Erro interno ao consultar mensagens do canal no WhatsApp
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: connection closed
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostNewsletterMessages
