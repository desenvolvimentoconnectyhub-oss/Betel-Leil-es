                      type: integer
                      minimum: 1
                      description: Identificador sequencial do post no canal.
                      example: 12345
                    text:
                      type: string
                      description: Novo texto ou nova legenda do post.
                      example: Post atualizado
                    count:
                      type: integer
                      minimum: 1
                      description: Quantidade de mensagens buscadas por pagina ao localizar o post.
                      example: 100
                    maxpages:
                      type: integer
                      minimum: 1
                      description: Quantidade maxima de paginas buscadas ao localizar o post.
                      example: 5
      responses:
