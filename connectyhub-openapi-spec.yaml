          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostSendRequestPayment
  /provider/send/pix-button:
    post:
      tags:
        - Enviar Mensagem
      summary: Enviar botao PIX
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Envia um botao nativo do WhatsApp que abre para pagamento PIX com a chave informada.

        O usuario visualiza o detalhe do recebedor, nome e chave.


        ## Regras principais

        - `pixType` aceita: `CPF`, `CNPJ`, `PHONE`, `EMAIL`, `EVP` (case insensitive)

        - `pixName` padrao: `"Pix"` quando nao informado - nome de quem recebe o pagamento



        ## Campos comuns

        Este endpoint herda os campos opcionais padronizados da tag **"Enviar Mensagem"**:

        `delay`, `readchat`, `readmessages`, `replyid`, `mentions`, `track_source`, `track_id` e `async`.


        ## Exemplo de payload

        ```json

        {
          "number": "5511999999999",
          "pixType": "EVP",
          "pixKey": "123e4567-e89b-12d3-a456-426614174000",
          "pixName": "Loja Exemplo"
        }

        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: >-
                        ID do chat para o qual a mensagem sera enviada. Pode ser um numero de telefone em formato
                        internacional, um ID de grupo (`@g.us`), um ID de usuario (com `@s.whatsapp.net` ou `@lid`).
                      example: '5511999999999'
                    pixType:
                      type: string
                      description: 'Tipo da chave PIX. Valores aceitos: CPF, CNPJ, PHONE, EMAIL ou EVP'
                      example: EVP
                    pixKey:
                      type: string
                      description: Valor da chave PIX (CPF/CNPJ/telefone/email/EVP)
                      example: 123e4567-e89b-12d3-a456-426614174000
                    pixName:
                      type: string
                      description: Nome exibido como recebedor do PIX (padrao "Pix" se vazio)
                      example: Loja Exemplo
                    async:
                      type: boolean
                      description: Enfileira o envio para processamento assincrono
                    delay:
                      type: integer
                      description: Atraso em milissegundos antes do envio (exibe "digitando..." no WhatsApp)
                    readchat:
                      type: boolean
                      description: Marca o chat como lido apos enviar a mensagem
                    readmessages:
                      type: boolean
                      description: Marca mensagens recentes como lidas apos o envio
                    replyid:
                      type: string
                      description: ID da mensagem que sera respondida
                    mentions:
                      type: string
                      description: Lista de numeros mencionados separados por virgula
                    track_source:
                      type: string
                      description: 'Origem de rastreamento (ex.: chatwoot, crm-interno)'
                    track_id:
                      type: string
                      description: Identificador de rastreamento (aceita valores duplicados)
                  required:
                    - number
                    - pixType
                    - pixKey
                  example:
                    number: '5511999999999'
                    pixType: EVP
                    pixKey: 123e4567-e89b-12d3-a456-426614174000
                    pixName: Loja Exemplo
      responses:
        '200':
          description: Botao PIX enviado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Message'
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          status:
                            type: string
                            example: success
                          message:
                            type: string
                            example: PIX button sent successfully
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Invalid keyType. Allowed: CPF, CNPJ, PHONE, EMAIL, EVP'
        '401':
          description: Nao autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid token
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to send PIX button
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostSendPixButton
  /provider/message/async:
    get:
      tags:
        - Mensagem Async
      summary: Consultar fila async de envio direto
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId como query string.


        Retorna um resumo simples da fila de envio `async=true` da instancia atual autenticada.


        Este endpoint cobre apenas a fila interna de envio direto assincrono. Ele **nao** representa:

        - campanhas de envio em massa do sender (`/sender/*`)


        A resposta padrao foi pensada para clientes:

        - `status`: visao resumida da fila (`idle`, `queued`, `processing`, `waiting_connection`, `resetting`)

        - `pending`: quantidade total estimada de mensagens pendentes

        - `processingNow`: indica se o worker esta ocupando um job neste momento

        - `acceptingNewMessages`: indica se a fila aceita novos envios async

        - `sessionReady`: indica se a sessao WhatsApp esta pronta para envio

        - `resetting`: indica se a fila esta pausada por reset/clear
      responses:
        '200':
          description: Resumo da fila async
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Async queue status
                  instanceId:
                    type: string
                    description: ID da instancia
                  queue:
                    type: object
                    properties:
                      status:
                        type: string
                        description: Estado resumido da fila
                        example: waiting_connection
                      pending:
                        type: integer
                        format: int64
                        description: Quantidade total estimada de mensagens pendentes
                        example: 3
                      processingNow:
                        type: boolean
                        description: Indica se ha um job ativo no worker agora
                        example: true
                      acceptingNewMessages:
                        type: boolean
                        description: Indica se a fila aceita novos envios async
                        example: true
                      sessionReady:
                        type: boolean
                        description: Indica se a sessao WhatsApp esta pronta para envio
                        example: false
                      resetting:
                        type: boolean
                        description: Indica se a fila async esta pausada por reset/clear
                        example: false
        '401':
          description: Token invalido ou ausente
        '500':
          description: Erro interno ao consultar a fila async
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  instanceId:
                    type: string
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Obrigatorio em chamadas GET.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerGetMessageAsync
    delete:
      tags:
        - Mensagem Async
      summary: Limpar fila async de envio direto
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string. Esta operacao nao exige payload especifico.


        Cancela toda a fila de envio `async=true` da instancia e marca as mensagens pendentes como `Canceled`.


        Este endpoint atua apenas na fila interna de envio direto assincrono. Ele **nao** afeta:

        - campanhas do sender (`/sender/*`)

        - mensagens ja enviadas com sucesso

        - mensagens em massa agendadas


        O fluxo executado e:

        1. pausa o worker interno da fila async

        2. drena jobs pendentes em memoria e overflow

        3. marca backlog persistido em `Queued` como `Canceled`

        4. libera a fila para novos envios async


        Use este endpoint quando houver backlog preso, fila acumulada ou quando voce quiser abortar todos os envios
        assincronos ainda nao concluidos.
      responses:
        '200':
          description: Fila async limpa com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Async queue cleared
                  instanceId:
                    type: string
                    description: ID da instancia
                  stats:
                    type: object
                    properties:
                      trackedJobsCleared:
                        type: integer
                        description: Quantidade de IDs rastreados removidos da fila em memoria
                        example: 3
                      bufferedJobsMarkedCanceled:
                        type: integer
                        description: Jobs em memoria marcados como `Canceled`
                        example: 2
                      drainedChannelJobs:
                        type: integer
                        description: Jobs removidos do canal principal da fila
                        example: 1
                      clearedOverflowJobs:
                        type: integer
                        description: Jobs removidos do backlog de overflow
                        example: 1
                      persistedQueuedCanceled:
                        type: integer
                        format: int64
                        description: Mensagens persistidas em `Queued` que foram atualizadas para `Canceled`
                        example: 5
        '401':
          description: Token invalido ou ausente
        '409':
          description: >-
            A fila nao pode ser limpa porque a instancia esta em reset ou havia envio em progresso que nao drenou a
            tempo
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: async queue did not drain before reset
                  instanceId:
                    type: string
                  stats:
                    type: object
                    additionalProperties: true
        '500':
          description: Erro interno ao limpar a fila async
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  instanceId:
                    type: string
                  stats:
                    type: object
                    additionalProperties: true
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  additionalProperties: true
                  description: Payload especifico da operacao, quando aplicavel.
      operationId: providerDeleteMessageAsync
  /provider/instance/updateDelaySettings:
    post:
      tags:
        - Mensagem Async
      summary: Configurar delay entre mensagens async
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Configura o intervalo de tempo entre mensagens diretas enviadas com `async=true`.


        ### Detalhes

        - Configuracao aplicada apenas a fila interna de mensagens async

        - Afeta mensagens enviadas pelos endpoints de envio com `async=true`

        - Nao afeta campanhas do sender (`/sender/*`)

        - Delay minimo (msg_delay_min): 0 ou mais segundos (0 = sem delay)

        - Delay maximo (msg_delay_max): se menor que min, sera ajustado para o mesmo valor de min

        - Sistema ajusta automaticamente valores negativos para 0


        ### Exemplo

        ```json

        {
          "msg_delay_min": 0,
          "msg_delay_max": 2
        }

        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    msg_delay_min:
                      type: integer
                      format: int64
                      minimum: 0
                      description: Delay minimo em segundos (0 = sem delay)
                      example: 0
                    msg_delay_max:
                      type: integer
                      format: int64
                      minimum: 0
                      description: Delay maximo em segundos
                      example: 2
                  required:
                    - msg_delay_min
                    - msg_delay_max
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance:
                    $ref: '#/components/schemas/Instance'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid request payload
        '401':
          description: Chave invalida ou expirada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: client not found
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to update delay settings
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostInstanceUpdateDelaySettings
  /provider/message/download:
    post:
      tags:
        - Acoes na mensagem e Buscar
      summary: Baixar arquivo de uma mensagem
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Baixa o arquivo associado a uma mensagem de midia (imagem, video, audio, documento ou sticker).


        ## Parametros


        - **id** (string, obrigatorio): ID da mensagem

        - **return_base64** (boolean, default: false): Retorna arquivo em base64

        - **generate_mp3** (boolean, default: true): Para audios, define formato de retorno
          - `true`: Retorna MP3
          - `false`: Retorna OGG
        - **return_link** (boolean, default: true): Retorna URL publica do arquivo

        - **transcribe** (boolean, default: false): Transcreve audios para texto

        - **openai_apikey** (string, opcional): Chave OpenAI para transcricao
          - Se nao informada, usa a chave salva na instancia
          - Se informada, atualiza e salva na instancia para proximas chamadas
        - **download_quoted** (boolean, default: false): Baixa midia da mensagem citada
          - Util para baixar conteudo original de status do WhatsApp
          - Quando uma mensagem e resposta a um status, permite baixar a midia do status original
          - **Contextualizacao**: Ao baixar a midia citada, voce identifica o contexto da conversa
            - Exemplo: Se alguem responde a uma promocao, baixando a midia voce sabera que a pergunta e sobre aquela promocao especifica

        ## Exemplos


        ### Baixar audio como MP3:

        ```json

        {
          "id": "7EB0F01D7244B421048F0706368376E0",
          "generate_mp3": true
        }

        ```


        ### Transcrever audio:

        ```json

        {
          "id": "7EB0F01D7244B421048F0706368376E0",
          "transcribe": true
        }

        ```


        ### Apenas base64 (sem salvar):

        ```json

        {
          "id": "7EB0F01D7244B421048F0706368376E0",
          "return_base64": true,
          "return_link": false
        }

        ```


        ### Baixar midia de status (mensagem citada):

        ```json

        {
          "id": "7EB0F01D7244B421048F0706368376E0",
          "download_quoted": true
        }

        ```

        *Util quando o cliente responde a uma promocao/status - voce baixa a midia original para entender sobre qual
        produto/oferta ele esta perguntando.*


        ## Resposta


        ```json

        {
          "fileURL": "https://api.exemplo.com/files/arquivo.mp3",
          "mimetype": "audio/mpeg",
          "base64Data": "UklGRkj...",
          "transcription": "Texto transcrito"
        }

        ```


        **Nota**:

        - Por padrao, se nao definido o contrario:
          1. audios sao retornados como MP3.
          2. E todos os pedidos de download sao retornados com URL publica.
        - Transcricao requer chave OpenAI valida. A chave pode ser configurada uma vez na instancia e sera reutilizada
        automaticamente.

        - Retencao de midia: mantemos as midias no nosso storage por 2 dias. Apos 2 dias, elas sao removidas na limpeza
        automatica e o link retornado deixa de ficar disponivel. Para voltar a disponibilizar a midia, e necessario
        refazer o download pelo endpoint. Se o cliente solicitar novamente, a midia sera baixada do CDN da Meta, o que
        pode aumentar o tempo de resposta. Enquanto estiver no nosso storage, a resposta tende a ser mais rapida.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    id:
                      type: string
                      description: ID da mensagem contendo o arquivo
                      example: 7EB0F01D7244B421048F0706368376E0
                    return_base64:
                      type: boolean
                      description: Se verdadeiro, retorna o conteudo em base64
                      default: false
                    generate_mp3:
                      type: boolean
                      description: Para audios, define formato de retorno (true=MP3, false=OGG)
                      default: true
                    return_link:
                      type: boolean
                      description: Salva e retorna URL publica do arquivo
                      default: true
                    transcribe:
                      type: boolean
                      description: Se verdadeiro, transcreve audios para texto
                      default: false
                    openai_apikey:
                      type: string
                      description: Chave da API OpenAI para transcricao (opcional)
                      example: sk-...
                    download_quoted:
                      type: boolean
                      description: Se verdadeiro, baixa midia da mensagem citada ao inves da mensagem principal
                      default: false
                  required:
                    - id
      responses:
        '200':
          description: Successful file download
          content:
            application/json:
              schema:
                type: object
                properties:
                  fileURL:
                    type: string
                    description: URL publica para acessar o arquivo (se return_link=true)
                    example: https://api.exemplo.com/files/arquivo.mp3
                  mimetype:
                    type: string
                    description: Tipo MIME do arquivo
                    example: audio/mpeg
                  base64Data:
                    type: string
                    description: Conteudo do arquivo em base64 (se return_base64=true)
                    example: UklGRkj...
                  transcription:
                    type: string
                    description: Texto transcrito do audio (se transcribe=true)
                    example: Texto transcrito
                required:
                  - mimetype
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unsupported media type or no media found in message
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid token
