  /provider/call/make:
    post:
      tags:
        - Chamadas
      summary: Iniciar chamada de voz
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Inicia uma chamada de voz para um contato especifico. Este endpoint permite:

        1. Iniciar chamadas de voz para contatos

        2. Funciona apenas com numeros validos do WhatsApp

        3. O contato recebera uma chamada de voz


        **Nota**: O telefone do contato tocara normalmente, mas ao contato atender, ele nao ouvira nada, e voce tambem
        nao ouvira nada.

        Este endpoint apenas inicia a chamada, nao estabelece uma comunicacao de voz real.


        **Opcional**: Use `call_duration` para definir por quantos segundos a chamada deve tocar.

        Apos esse periodo a chamada e encerrada automaticamente, sem precisar chamar `/call/reject`.


        Exemplo de requisicao:

        ```json

        {
          "number": "5511999999999",
          "call_duration": 15
        }

        ```


        Exemplo de resposta:

        ```json

        {
          "response": "Call successful"
        }

        ```


        Erros comuns:

        - 401: Chave invalida ou expirada

        - 400: Numero invalido ou ausente

        - 500: Erro ao iniciar chamada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    number:
                      type: string
                      description: 'Numero do contato no formato internacional (ex: 5511999999999)'
                      example: '5511999999999'
                    call_duration:
                      type: integer
                      description: >-
                        Duracao da chamada em segundos (opcional). Apos esse tempo a chamada e encerrada
                        automaticamente.
                      example: 15
                  required:
                    - number
      responses:
        '200':
          description: Chamada iniciada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de confirmacao
                    example: Call successful
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descricao do erro
              examples:
                missing_number:
                  summary: Numero nao informado
                  value:
                    error: missing number in payload
                invalid_number:
                  summary: Numero invalido
                  value:
                    error: invalid number JID
                invalid_duration:
                  summary: Duracao invalida
                  value:
                    error: invalid call_duration
        '401':
          description: Chave invalida ou expirada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descricao do erro de autenticacao
                    example: client not found
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descricao do erro interno
                    example: 'error making call: network timeout'
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostCallMake
