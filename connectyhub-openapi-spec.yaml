                      description: Nome do item principal listado no fluxo
                      example: Assinatura Plano Ouro
                    invoiceNumber:
                      type: string
                      description: Identificador ou numero da fatura
                      example: PED-123
                    amount:
                      type: number
                      format: float
                      description: Valor da cobranca (em BRL por padrao)
                      example: 199.9
                    pixKey:
                      type: string
                      description: Chave PIX estatico (CPF/CNPJ/telefone/email/EVP)
                      example: 123e4567-e89b-12d3-a456-426614174000
                    pixType:
                      type: string
                      description: Tipo da chave PIX (`CPF`, `CNPJ`, `PHONE`, `EMAIL`, `EVP`). Padrao `EVP`
                      example: EVP
                    pixName:
                      type: string
                      description: Nome do recebedor exibido no fluxo (padrao usa o nome do perfil da instancia)
                      example: Loja Exemplo
                    paymentLink:
