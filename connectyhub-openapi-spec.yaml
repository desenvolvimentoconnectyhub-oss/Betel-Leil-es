  /provider/webhook:
    get:
      tags:
        - Webhooks e SSE
      summary: Ver Webhook da Instancia
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId como query string.


        Retorna a configuracao atual do webhook da instancia, incluindo:

        - URL configurada

        - Eventos ativos

        - Filtros aplicados

        - Configuracoes adicionais


        Exemplo de resposta:

        ```json

        [
          {
            "id": "123e4567-e89b-12d3-a456-426614174000",
            "enabled": true,
            "url": "https://example.com/webhook",
            "events": ["messages", "messages_update"],
            "excludeMessages": ["wasSentByApi", "isGroupNo"],
            "addUrlEvents": true,
            "addUrlTypesMessages": true
          },
          {
            "id": "987fcdeb-51k3-09j8-x543-864297539100",
            "enabled": true,
            "url": "https://outro-endpoint.com/webhook",
            "events": ["connection", "presence"],
            "excludeMessages": [],
            "addUrlEvents": false,
            "addUrlTypesMessages": false
          }
        ]

        ```


        A resposta e sempre um array, mesmo quando ha apenas um webhook configurado.
      responses:
        '200':
          description: Configuracao do webhook retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Webhook'
              example:
                - id: 123e4567-e89b-12d3-a456-426614174000
                  enabled: true
                  url: https://example.com/webhook
                  events:
                    - messages
                    - messages_update
                  excludeMessages:
                    - wasSentByApi
                    - isGroupNo
                  addUrlEvents: true
                  addUrlTypesMessages: true
                - id: 987fcdeb-51k3-09j8-x543-864297539100
                  enabled: true
                  url: https://outro-endpoint.com/webhook
                  events:
                    - connection
                    - presence
                  excludeMessages: []
                  addUrlEvents: false
                  addUrlTypesMessages: false
        '401':
          description: Token invalido ou nao fornecido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: missing token
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to process webhook data
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Obrigatorio em chamadas GET.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerGetWebhook
    post:
      tags:
        - Webhooks e SSE
      summary: Configurar Webhook da Instancia
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Gerencia a configuracao de webhooks para receber eventos em tempo real da instancia.

        Permite gerenciar multiplos webhooks por instancia atraves do campo ID e action.


        ###  Modo Simples (Recomendado)


        **Uso mais facil - sem complexidade de IDs**:

        - Nao inclua `action` nem `id` no payload

        - Gerencia automaticamente um unico webhook por instancia

        - Cria novo ou atualiza o existente automaticamente

        - **Recomendado**: Sempre use `"excludeMessages": ["wasSentByApi"]` para evitar loops

        - **Exemplo**: `{"url": "https://meusite.com/webhook", "events": ["messages"], "excludeMessages":
        ["wasSentByApi"]}`


        ###  Sites para Testes (ordenados por qualidade)


        **Para testar webhooks durante desenvolvimento**:

        1. **https://webhook.cool/** -  Melhor opcao (sem rate limit, interface limpa)

        2. **https://rbaskets.in/** -  Boa alternativa (confiavel, baixo rate limit)

        3. **https://webhook.site/** -  Evitar se possivel (rate limit agressivo)


        ###  Modo Avancado (Para multiplos webhooks)


        **Para usuarios que precisam de multiplos webhooks por instancia**:

         **Dica**: Mesmo precisando de multiplos webhooks, considere usar `addUrlEvents` no modo simples.
        Um unico webhook pode receber diferentes tipos de eventos em URLs especificas

        (ex: `/webhook/message`, `/webhook/connection`), eliminando a necessidade de multiplos webhooks.


        1. **Criar Novo Webhook**:
           - Use `action: "add"`
           - Nao inclua `id` no payload
           - O sistema gera ID automaticamente

        2. **Atualizar Webhook Existente**:
           - Use `action: "update"`
           - Inclua o `id` do webhook no payload
           - Todos os campos serao atualizados

        3. **Remover Webhook**:
           - Use `action: "delete"`
           - Inclua apenas o `id` do webhook
           - Outros campos sao ignorados



        ### Eventos Disponiveis

        - `connection`: Alteracoes no estado da conexao

        - `history`: Recebimento de historico de mensagens

        - `messages`: Novas mensagens recebidas

        - `messages_update`: Atualizacoes em mensagens existentes

        - `newsletter_messages`: Novos posts/mensagens de canais do WhatsApp
          Para views e reactions de canais, use a rota `/newsletter/updates`.
        - `call`: Eventos de chamadas VoIP

        - `contacts`: Atualizacoes na agenda de contatos

        - `presence`: Alteracoes no status de presenca

        - `groups`: Modificacoes em grupos

        - `labels`: Gerenciamento de etiquetas

        - `chats`: Eventos de conversas

        - `chat_labels`: Alteracoes em etiquetas de conversas

        - `blocks`: Bloqueios/desbloqueios

        - `sender`: Atualizacoes de campanhas, quando inicia, e quando completa


        **Remover mensagens com base nos filtros**:

        - `wasSentByApi`: Mensagens originadas pela API  **IMPORTANTE:** Use sempre este filtro para evitar loops em
        automacoes

        - `wasNotSentByApi`: Mensagens nao originadas pela API

        - `fromMeYes`: Mensagens enviadas pelo usuario

        - `fromMeNo`: Mensagens recebidas de terceiros

        - `isGroupYes`: Mensagens em grupos

        - `isGroupNo`: Mensagens em conversas individuais

         **Prevencao de Loops**: Se voce tem automacoes que enviam mensagens via API, sempre inclua `"excludeMessages": ["wasSentByApi"]` no seu webhook. Caso prefira receber esses eventos, certifique-se de que sua automacao detecta mensagens enviadas pela propria API para nao criar loops infinitos.

        **Acoes Suportadas**:

        - `add`: Registrar novo webhook

        - `delete`: Remover webhook existente


        **Parametros de URL**:

        - `addUrlEvents` (boolean): Quando ativo, adiciona o tipo do evento como path parameter na URL.
          Exemplo: `https://api.example.com/webhook/{evento}`
        - `addUrlTypesMessages` (boolean): Quando ativo, adiciona o tipo da mensagem como path parameter na URL.
          Exemplo: `https://api.example.com/webhook/{tipo_mensagem}`

        **Combinacoes de Parametros**:

        - Ambos ativos: `https://api.example.com/webhook/{evento}/{tipo_mensagem}`
          Exemplo real: `https://api.example.com/webhook/message/conversation`
        - Apenas eventos: `https://api.example.com/webhook/message`

        - Apenas tipos: `https://api.example.com/webhook/conversation`


        **Notas Tecnicas**:

        1. Os parametros sao adicionados na ordem: evento  tipo mensagem

        2. A URL deve ser configurada para aceitar esses parametros dinamicos

        3. Funciona com qualquer combinacao de eventos/mensagens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    id:
                      type: string
                      description: ID unico do webhook (necessario para update/delete)
                      example: 123e4567-e89b-12d3-a456-426614174000
                    enabled:
                      type: boolean
                      description: Habilita/desabilita o webhook
                      example: true
                    url:
                      type: string
                      description: URL para receber os eventos
                      example: https://example.com/webhook
                    events:
                      type: array
                      description: Lista de eventos monitorados
                      items:
                        type: string
                        enum:
                          - connection
                          - history
                          - messages
                          - messages_update
                          - newsletter_messages
                          - call
                          - contacts
                          - presence
                          - groups
                          - labels
                          - chats
                          - chat_labels
                          - blocks
                          - sender
                    excludeMessages:
                      type: array
                      description: Filtros para excluir tipos de mensagens
                      items:
                        type: string
                        enum:
                          - wasSentByApi
                          - wasNotSentByApi
                          - fromMeYes
                          - fromMeNo
                          - isGroupYes
                          - isGroupNo
                    addUrlEvents:
                      type: boolean
                      description: |
                        Adiciona o tipo do evento como parametro na URL.
                        - `false` (padrao): URL normal
                        - `true`: Adiciona evento na URL (ex: `/webhook/message`)
                      default: false
                    addUrlTypesMessages:
                      type: boolean
                      description: |
                        Adiciona o tipo da mensagem como parametro na URL.
                        - `false` (padrao): URL normal
                        - `true`: Adiciona tipo da mensagem (ex: `/webhook/conversation`)
                      default: false
                    action:
                      type: string
                      description: |
                        Acao a ser executada:
                        - add: criar novo webhook
                        - update: atualizar webhook existente (requer id)
                        - delete: remover webhook (requer apenas id)
                        Se nao informado, opera no modo simples (unico webhook)
                      enum:
                        - add
                        - update
                        - delete
                  required:
                    - url
      responses:
        '200':
          description: Webhook configurado ou atualizado com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Webhook'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid action
        '401':
          description: Token invalido ou nao fornecido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: missing token
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Could not save webhook
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostWebhook
  /provider/webhook/errors:
    get:
      tags:
        - Webhooks e SSE
      summary: Ver ultimos erros do webhook local
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId como query string.


        Retorna em memoria os ultimos 20 erros de envio dos webhooks locais da instancia autenticada.


        Cada item inclui data/hora (`created`), URL de destino, evento, tipo do webhook

        (`local`), payload tentado, numero de tentativas, status HTTP final quando existir e a mensagem de erro.


        Observacoes:

        - O historico fica apenas em memoria e e perdido quando o processo reinicia.

        - O endpoint usa o mesmo `token` da instancia.

        - Retorna apenas falhas dos webhooks locais da propria instancia.

        - Falhas do webhook global ficam disponiveis separadamente em `/globalwebhook/errors` com `credencial interna`.

        - O header `X-Webhook-Error-Capture-Started-At` informa desde quando a captura atual esta valendo.


        Exemplo de consulta:

        ```bash

        curl -X GET "$BASE_URL/webhook/errors" \
          -H "token: SUA_INSTANCIA_TOKEN"
        ```
      responses:
        '200':
          description: Historico retornado com sucesso
          headers:
            X-Webhook-Error-Capture-Started-At:
              description: Data/hora em que a captura atual de erros comecou para a instancia
              schema:
                type: string
                format: date-time
                example: '2026-03-23T14:50:00Z'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    created:
                      type: string
                      format: date-time
                      example: '2026-03-23T15:04:05Z'
                    url:
                      type: string
                      example: https://example.com/webhook/messages
                    type:
                      type: string
                      example: local
                    event:
                      type: string
                      example: messages
                    message_type:
                      type: string
                      example: text
                    status_code:
                      type: integer
                      example: 502
                    attempts:
                      type: integer
                      example: 3
                    error:
                      type: string
                      example: 'webhook returned non-success status: 502 Bad Gateway'
                    payload:
                      type: object
              example:
                - created: '2026-03-23T15:04:05Z'
                  url: https://example.com/webhook/messages
                  type: local
                  event: messages
                  message_type: text
                  status_code: 502
                  attempts: 3
                  error: 'webhook returned non-success status: 502 Bad Gateway'
                  payload:
                    EventType: messages
                    token: instance-token
        '401':
          description: Token invalido ou nao fornecido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: missing token
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Obrigatorio em chamadas GET.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerGetWebhookErrors
  /provider/sse:
    get:
      tags:
        - Webhooks e SSE
      summary: Server-Sent Events (SSE)
      description: >-
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId como query string.


        Receber eventos em tempo real via Server-Sent Events (SSE)


        ### Funcionalidades Principais:

        - Configuracao de URL para recebimento de eventos

        - Selecao granular de tipos de eventos

        - Filtragem avancada de mensagens

        - Parametros adicionais na URL

        - Gerenciamento multiplo de webhooks


        **Eventos Disponiveis**:

        - `connection`: Alteracoes no estado da conexao

        - `history`: Recebimento de historico de mensagens

        - `messages`: Novas mensagens recebidas

        - `messages_update`: Atualizacoes em mensagens existentes

        - `call`: Eventos de chamadas VoIP

        - `contacts`: Atualizacoes na agenda de contatos

        - `presence`: Alteracoes no status de presenca

        - `groups`: Modificacoes em grupos

        - `labels`: Gerenciamento de etiquetas

        - `chats`: Eventos de conversas

        - `chat_labels`: Alteracoes em etiquetas de conversas

        - `blocks`: Bloqueios/desbloqueios



        Estabelece uma conexao persistente para receber eventos em tempo real. Este

        endpoint:


        1. Requer autenticacao via token


        2. Mantem uma conexao HTTP aberta com o cliente


        3. Envia eventos conforme ocorrem no servidor


        4. Suporta diferentes tipos de eventos


        Exemplo de uso:


        ```javascript


        const eventSource = new

        EventSource('/sse?token=SEU_TOKEN&events=chats,messages');



        eventSource.onmessage = function(event) {
          const data = JSON.parse(event.data);
          console.log('Novo evento:', data);
        };



        eventSource.onerror = function(error) {
          console.error('Erro na conexao SSE:', error);
        };


        ```



        Estrutura de um evento:


        ```json


        {
          "type": "message",
          "data": {
            "id": "3EB0538DA65A59F6D8A251",
            "from": "5511999999999@s.whatsapp.net",
            "to": "5511888888888@s.whatsapp.net",
            "text": "Ola!",
            "timestamp": 1672531200000
          }
        }


        ```
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Obrigatorio em chamadas GET.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
        - name: events
          in: query
          schema:
            type: string
          required: true
          description: |
            Tipos de eventos a serem recebidos. Suporta dois formatos:
            - Separados por virgula: `?events=chats,messages`
            - Parametros repetidos: `?events=chats&events=messages`
          example: chats,messages
        - name: excludeMessages
          in: query
          schema:
            type: string
          required: false
          description: |
            Tipos de mensagens a serem excluidas do evento `messages`. Suporta dois formatos:
            - Separados por virgula: `?excludeMessages=poll,reaction`
            - Parametros repetidos: `?excludeMessages=poll&excludeMessages=reaction`
          example: poll,reaction
      responses:
        '200':
          description: Sucesso
      operationId: providerGetSse
