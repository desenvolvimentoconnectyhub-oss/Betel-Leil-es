  /provider/label/edit:
    post:
      tags:
        - Etiquetas
      summary: Criar, editar ou deletar etiqueta
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Cria, edita ou deleta uma etiqueta da instancia.


        Regras de uso:

        - Para editar uma etiqueta existente, envie o `labelid` real da etiqueta.

        - Para criar uma nova etiqueta, envie `labelid: "new"` com `delete: false`.
          O backend ira gerar o proximo `labelid` numerico disponivel para a instancia.
        - Para deletar uma etiqueta existente, envie o `labelid` real com `delete: true`.


        Observacoes:

        - A resposta de sucesso retorna `"Label created"` para criacao e `"Label edited"` para edicao.

        - Para descobrir o `labelid` final criado, consulte `GET /labels` apos a operacao
          ou consuma o webhook/evento de labels da instancia.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    labelid:
                      type: string
                      description: |
                        ID da etiqueta.

                        Use o ID real para editar/deletar uma etiqueta existente.
                        Use `"new"` para criar uma nova etiqueta quando `delete` for `false`.
                      example: '25'
                    name:
                      type: string
                      description: Novo nome da etiqueta
                      example: responder editado
                    color:
                      type: integer
                      description: Codigo numerico da nova cor (0-19)
                      minimum: 0
                      maximum: 19
                      example: 2
                    delete:
                      type: boolean
                      description: Indica se a etiqueta deve ser deletada
                      example: false
                  required:
                    - labelid
      responses:
        '200':
          description: Operacao concluida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    enum:
                      - Label created
                      - Label edited
                    example: Label edited
              examples:
                created:
                  summary: Resposta ao criar uma etiqueta
                  value:
                    response: Label created
                edited:
                  summary: Resposta ao editar uma etiqueta
                  value:
                    response: Label edited
        '400':
          description: Payload invalido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid payload
        '500':
          description: Erro interno do servidor ou sessao invalida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: error editing label
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostLabelEdit
