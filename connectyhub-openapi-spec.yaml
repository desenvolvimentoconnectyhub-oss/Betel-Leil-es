  /provider/instance/presence:
    post:
      tags:
        - Instancias
      summary: Atualizar status de presenca da instancia
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Atualiza o status de presenca global da conta do WhatsApp atualmente conectada. Este endpoint permite:

        1. Definir se a conta aparece como disponivel ("online") ou indisponivel

        2. Controlar o status de presenca para todos os contatos

        3. Salvar o estado atual da presenca para a conta conectada


        Tipos de presenca suportados:

        - available: Marca a conta como disponivel/online

        - unavailable: Marca a conta como indisponivel/offline


        **Atencao**:

        - O status de presenca pode ser temporariamente alterado para "available" (online) em algumas situacoes internas
        da API, e com isso o visto por ultimo tambem pode ser atualizado.

        - Caso isso for um problema, considere alterar suas configuracoes de privacidade no WhatsApp para nao mostrar o
        visto por ultimo e/ou quem pode ver seu status "online".


        ** Importante - Limitacao do Presence "unavailable"**:

        - **Quando a API e o unico dispositivo ativo**: Confirmacoes de entrega/leitura (ticks cinzas/azuis) nao sao
        enviadas nem recebidas

        - **Impacto**: Eventos `message_update` com status de entrega podem nao ser recebidos

        - **Solucao**: Se precisar das confirmacoes, mantenha WhatsApp Web ou aplicativo movel ativo ou use presence
        "available"


        Exemplo de requisicao:

        ```json

        {
          "presence": "available"
        }

        ```


