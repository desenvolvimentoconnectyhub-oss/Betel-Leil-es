                properties:
                  response:
                    type: string
                    example: Chat mute settings updated successfully
        '400':
          description: Duracao invalida ou formato de numero incorreto
        '401':
          description: Token invalido ou ausente
        '404':
          description: Chat nao encontrado
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPostChatMute
