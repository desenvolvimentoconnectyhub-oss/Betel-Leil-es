        - busca a mensagem recente do canal via WhatsApp/whatsmeow

        - localiza o post por `messageid` ou `serverid`

        - edita apenas tipos suportados (`text`, `image`, `video`, `document`)


        Observacoes:

        - use `jid` ou `id` para identificar o canal

        - envie ao menos um entre `messageid` e `serverid`

        - envie `text` com o novo conteudo/legenda

        - `count` e `maxpages` controlam a janela de busca no canal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  required:
                    - text
                  properties:
                    id:
                      type: string
                      description: ID numerico do canal. Se informado sem dominio, sera convertido para `@newsletter`.
