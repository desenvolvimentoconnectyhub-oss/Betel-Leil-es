  /provider/send/carousel:
    post:
      tags:
        - Enviar Mensagem
      summary: Enviar carrossel de midia com botoes
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Este endpoint permite enviar um carrossel com imagens e botoes interativos.

        Funciona de maneira igual ao endpoint `/send/menu` com type: carousel, porem usando outro formato de payload.


        ## Campos Comuns


        Este endpoint suporta todos os **campos opcionais comuns** documentados na tag **"Enviar Mensagem"**, incluindo:

        `delay`, `readchat`, `readmessages`, `replyid`, `mentions`, `forward`, `track_source`, `track_id`, placeholders
        e envio para grupos.


        ## Estrutura do Payload


        ```json

        {
          "number": "5511999999999",
          "text": "Texto principal",
          "carousel": [
            {
              "text": "Texto do cartao",
              "image": "URL da imagem",
              "buttons": [
                {
                  "id": "resposta1",
                  "text": "Texto do botao",
                  "type": "REPLY"
                }
              ]
            }
          ],
          "delay": 1000,
          "readchat": true
        }

        ```


        ## Tipos de Botoes


        - `REPLY`: Botao de resposta rapida
          - Quando clicado, envia o valor do id como resposta ao chat
          - O id sera o texto enviado como resposta

        - `URL`: Botao com link
          - Quando clicado, abre a URL especificada
          - O id deve conter a URL completa (ex: https://exemplo.com)

        - `COPY`: Botao para copiar texto
          - Quando clicado, copia o texto para a area de transferencia
          - O id sera o texto que sera copiado

        - `CALL`: Botao para realizar chamada
          - Quando clicado, inicia uma chamada telefonica
          - O id deve conter o numero de telefone

        ## Exemplo de Botoes

        ```json

        {
          "buttons": [
            {
              "id": "Sim, quero comprar!",
              "text": "Confirmar Compra",
              "type": "REPLY"
            },
            {
              "id": "https://exemplo.com/produto",
              "text": "Ver Produto",
              "type": "URL"
            },
            {
              "id": "CUPOM20",
              "text": "Copiar Cupom",
              "type": "COPY"
            },
            {
              "id": "5511999999999",
              "text": "Falar com Vendedor",
              "type": "CALL"
            }
          ]
        }

        ```


        ## Exemplo Completo de Carrossel

        ```json

        {
          "number": "5511999999999",
          "text": "Nossos Produtos em Destaque",
          "carousel": [
            {
              "text": "Smartphone XYZ\nO mais avancado smartphone da linha",
              "image": "https://exemplo.com/produto1.jpg",
              "buttons": [
                {
                  "id": "SIM_COMPRAR_XYZ",
                  "text": "Comprar Agora",
                  "type": "REPLY"
                },
                {
                  "id": "https://exemplo.com/xyz",
                  "text": "Ver Detalhes",
                  "type": "URL"
                }
              ]
            },
            {
              "text": "Cupom de Desconto\nGanhe 20% OFF em qualquer produto",
              "image": "https://exemplo.com/cupom.jpg",
              "buttons": [
                {
                  "id": "DESCONTO20",
                  "text": "Copiar Cupom",
                  "type": "COPY"
                },
                {
                  "id": "5511999999999",
                  "text": "Falar com Vendedor",
                  "type": "CALL"
                }
              ]
            }
          ],
          "delay": 0,
          "readchat": true
        }

        ```
