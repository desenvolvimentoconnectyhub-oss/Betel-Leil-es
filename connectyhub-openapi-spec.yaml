          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerGetChatwootConfig
    put:
      tags:
        - Integracao Chatwoot
      summary: Atualizar configuracao do Chatwoot
      description: >
        Rota avancada exposta pela ConnectyHub. A autenticacao e feita pela chave ConnectyHub; a plataforma localiza a
        instancia pelo instanceId e aplica as permissoes do cliente antes de encaminhar a operacao.


        Envie instanceId no corpo ou query string e coloque os campos especificos da operacao dentro de payload.


        Atualiza a configuracao da integracao com Chatwoot para a instancia.


        ### Funcionalidades:

        - Configura todos os parametros da integracao Chatwoot

        - Reinicializa automaticamente o cliente Chatwoot quando habilitado

        - Retorna URL do webhook para configurar no Chatwoot

        - Sincronizacao bidirecional de mensagens novas entre WhatsApp e Chatwoot

        - Sincronizacao automatica de contatos (nome e telefone)

        - Atualizacao automatica LID  PN (Local ID para Phone Number)

        - Sistema de nomes inteligentes com til (~)


        ### Configuracao no Chatwoot:

        1. Apos configurar via API, use a URL retornada no webhook settings da inbox no Chatwoot

        2. Configure como webhook URL na sua inbox do Chatwoot

        3. A integracao ficara ativa e sincronizara mensagens e contatos automaticamente


        ###  Sistema de Nomes Inteligentes:

        - **Nomes com til (~)**: Sao atualizados automaticamente quando o contato modifica seu nome no WhatsApp

        - **Nomes especificos**: Para definir um nome fixo, remova o til (~) do nome no Chatwoot

        - **Exemplo**: "~Joao Silva" sera atualizado automaticamente, "Joao Silva" (sem til) permanecera fixo

        - **Atualizacao LIDPN**: Contatos migram automaticamente de Local ID para Phone Number quando disponivel

        - **Sem duplicacao**: Durante a migracao LIDPN, nao havera duplicacao de conversas

        - **Respostas nativas**: Todas as respostas dos agentes aparecem nativamente no Chatwoot


        ###  AVISO IMPORTANTE - INTEGRACAO BETA:

        - **Fase Beta**: Esta integracao esta em fase de desenvolvimento e testes

        - **Uso por conta e risco**: O usuario assume total responsabilidade pelo uso

        - **Recomendacao**: Teste em ambiente nao-produtivo antes de usar em producao

        - **Suporte limitado**: Funcionalidades podem mudar sem aviso previo


        ###  Limitacoes Conhecidas:

        - **Sincronizacao de historico**: Nao implementada - apenas mensagens novas sao sincronizadas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instanceId
                - payload
              properties:
                instanceId:
                  type: string
                  format: uuid
                  description: ID publico da instancia ConnectyHub.
                  example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
                payload:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Habilitar/desabilitar integracao com Chatwoot
                      example: true
                    url:
                      type: string
                      description: URL base da instancia Chatwoot (sem barra final)
                      example: https://app.chatwoot.com
                    access_token:
                      type: string
                      description: Token de acesso da API Chatwoot (obtido em Profile Settings > Access Token)
                      example: pXXGHHHyJPYHYgWHJHYHgJjj
                    account_id:
                      type: integer
                      format: int64
                      description: ID da conta no Chatwoot (visivel na URL da conta)
                      example: 1
                    inbox_id:
                      type: integer
                      format: int64
                      description: ID da inbox no Chatwoot (obtido nas configuracoes da inbox)
                      example: 5
                    ignore_groups:
                      type: boolean
                      description: Ignorar mensagens de grupos do WhatsApp na sincronizacao
                      example: false
                    sign_messages:
                      type: boolean
                      description: Assinar mensagens enviadas para WhatsApp com identificacao do agente
                      example: true
                    create_new_conversation:
                      type: boolean
                      description: Sempre criar nova conversa ao inves de reutilizar conversas existentes
                      example: false
                  required:
                    - enabled
                    - url
                    - access_token
                    - account_id
                    - inbox_id
      responses:
        '200':
          description: Configuracao atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Mensagem de confirmacao
                    example: 'Chatwoot config updated successfully, put this URL in Chatwoot inbox webhook settings:'
                  chatwoot_inbox_webhook_url:
                    type: string
                    description: URL do webhook para configurar na inbox do Chatwoot
                    example: https://sua-api.com/chatwoot/webhook/inst_abc123
        '400':
          description: Dados invalidos no body da requisicao
        '401':
          description: Chave invalida ou expirada
        '500':
          description: Erro interno ao salvar configuracao
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: instanceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID publico da instancia ConnectyHub. Em metodos com body, tambem pode ser enviado no corpo.
          example: ea36f5db-c8dd-48ca-9e28-73ca3f015d78
      operationId: providerPutChatwootConfig
